// ============= CRONOGRAMA =============
function Cronograma({ cronograma, setCronograma, C }) {
  const [editando, setEditando] = useState(null);

  const novaSemana = () => {
    const hoje = new Date();
    const fim = new Date(hoje.getTime() + 6 * 86400000);
    const s = {
      id: 's-' + Date.now(),
      inicio: hoje.toLocaleDateString('pt-BR'),
      fim: fim.toLocaleDateString('pt-BR'),
      dias: ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'].map(d => ({
        nome: d, temas: '', temasChecklist: [], questoes: '', flashcards: '', concluido: false
      })),
      metaQuestoes: 50, metaFlashcards: 20, metaArtigos: 2, observacoes: ''
    };
    setCronograma({ semanas: [s, ...(cronograma.semanas || [])] });
    setEditando(s.id);
  };

  const atualizar = (id, campo, valor) => {
    setCronograma({
      semanas: cronograma.semanas.map(s => s.id === id ? { ...s, [campo]: valor } : s)
    });
  };

  const atualizarDia = (id, idxDia, campo, valor) => {
    setCronograma({
      semanas: cronograma.semanas.map(s => s.id === id ? {
        ...s, dias: s.dias.map((d, i) => {
          if (i !== idxDia) return d;
          const atualizado = { ...d, [campo]: valor };
          if (campo === 'temas') {
            const temasChecklist = normalizarTemasDoDia(atualizado);
            return { ...atualizado, temasChecklist, concluido: temasChecklist.length > 0 && temasChecklist.every(t => t.concluido) };
          }
          return atualizado;
        })
      } : s)
    });
  };

  const atualizarTemaDia = (id, idxDia, idxTema, concluido) => {
    setCronograma({
      semanas: cronograma.semanas.map(s => s.id === id ? {
        ...s, dias: s.dias.map((d, i) => {
          if (i !== idxDia) return d;
          const temasChecklist = normalizarTemasDoDia(d).map((t, j) => j === idxTema ? { ...t, concluido } : t);
          return { ...d, temasChecklist, concluido: temasChecklist.length > 0 && temasChecklist.every(t => t.concluido) };
        })
      } : s)
    });
  };

  const semanas = cronograma.semanas || [];
  const historicoSemanas = semanas.map(s => {
    const resumo = resumoConclusaoTemas(s.dias || []);
    const pct = resumo.total ? Math.round((resumo.concluidos / resumo.total) * 100) : 0;
    return { ...s, resumo, pct };
  });
  const temasEstudados = semanas.flatMap(s =>
    (s.dias || []).flatMap(dia =>
      normalizarTemasDoDia(dia)
        .filter(t => t.concluido)
        .map(t => ({ titulo: t.titulo, dia: dia.nome, semana: `${s.inicio} a ${s.fim}` }))
    )
  );

  return (
    <div className="lumen-fade-in">
      <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 16, alignItems: 'center', flexWrap: 'wrap', gap: 10 }}>
        <p style={{ color: C.textMuted, fontSize: 14, margin: 0 }}>
          Organize seus estudos por semana, defina metas e acompanhe o progresso.
        </p>
        <Button C={C} icon={I.Plus} onClick={novaSemana}>Nova semana</Button>
      </div>

      {(!semanas || semanas.length === 0) ? (
        <Card C={C} style={{ textAlign: 'center', padding: 60 }}>
          <I.Calendar size={32} />
          <div style={{ fontSize: 15, color: C.textMuted, marginTop: 12, marginBottom: 4 }}>Nenhuma semana criada.</div>
          <div style={{ fontSize: 13, color: C.textSoft, marginBottom: 16 }}>
            Crie sua primeira semana para começar a planejar.
          </div>
        </Card>
      ) : (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
          <Card C={C}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 12, flexWrap: 'wrap', marginBottom: 16 }}>
              <div>
                <h3 className="lumen-serif" style={{ fontSize: 19, margin: 0, color: C.text }}>Histórico do cronograma</h3>
                <div style={{ fontSize: 12.5, color: C.textMuted, marginTop: 4 }}>Semanas criadas e temas já marcados como estudados.</div>
              </div>
              <Badge C={C}>{temasEstudados.length} temas estudados</Badge>
            </div>

            <div className="lumen-grid-resp" style={{ display: 'grid', gridTemplateColumns: 'minmax(0, 1.15fr) minmax(0, 1fr)', gap: 16 }}>
              <div>
                <div style={{ fontSize: 11, color: C.textSoft, fontWeight: 700, letterSpacing: '0.05em', textTransform: 'uppercase', marginBottom: 8 }}>Histórico das semanas</div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 8, maxHeight: 260, overflowY: 'auto' }} className="lumen-scroll">
                  {historicoSemanas.map(sHist => (
                    <div key={sHist.id} style={{ padding: 10, borderRadius: 8, background: C.bg, border: `1px solid ${C.borderSoft}` }}>
                      <div style={{ display: 'flex', justifyContent: 'space-between', gap: 8, marginBottom: 6 }}>
                        <strong style={{ fontSize: 12.5, color: C.text }}>Semana de {sHist.inicio} a {sHist.fim}</strong>
                        <span style={{ fontSize: 12, color: C.textMuted }}>{sHist.resumo.concluidos}/{sHist.resumo.total}</span>
                      </div>
                      <div style={{ height: 6, background: C.borderSoft, borderRadius: 4, overflow: 'hidden' }}>
                        <div style={{ height: '100%', width: `${sHist.pct}%`, background: C.accent }} />
                      </div>
                      <div style={{ fontSize: 11.5, color: C.textSoft, marginTop: 5 }}>{sHist.pct}% realizado</div>
                    </div>
                  ))}
                </div>
              </div>

              <div>
                <div style={{ fontSize: 11, color: C.textSoft, fontWeight: 700, letterSpacing: '0.05em', textTransform: 'uppercase', marginBottom: 8 }}>Temas já estudados</div>
                {temasEstudados.length === 0 ? (
                  <div style={{ padding: 18, borderRadius: 8, background: C.bg, border: `1px solid ${C.borderSoft}`, fontSize: 12.5, color: C.textSoft }}>
                    Marque temas como realizados para formar seu histórico de estudos.
                  </div>
                ) : (
                  <div style={{ display: 'flex', flexDirection: 'column', gap: 7, maxHeight: 260, overflowY: 'auto' }} className="lumen-scroll">
                    {temasEstudados.slice(0, 80).map((t, idx) => (
                      <div key={idx} style={{ padding: 9, borderRadius: 8, background: C.bg, border: `1px solid ${C.borderSoft}` }}>
                        <div style={{ fontSize: 12.5, color: C.text, fontWeight: 600 }}>{t.titulo}</div>
                        <div style={{ fontSize: 11, color: C.textSoft, marginTop: 3 }}>{t.dia} • {t.semana}</div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          </Card>

          {semanas.map(s => (
            <Card key={s.id} C={C}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 14, flexWrap: 'wrap', gap: 10 }}>
                <h3 className="lumen-serif" style={{ fontSize: 19, margin: 0, color: C.text }}>
                  Semana de {s.inicio} a {s.fim}
                </h3>
                <div style={{ display: 'flex', gap: 8 }}>
                  <Button C={C} variant="secondary" size="sm" icon={I.Edit}
                    onClick={() => setEditando(editando === s.id ? null : s.id)}>
                    {editando === s.id ? 'Fechar' : 'Editar'}
                  </Button>
                  <Button C={C} variant="ghost" size="sm" icon={I.Trash}
                    onClick={() => { if (confirm('Deletar esta semana?')) setCronograma({semanas: cronograma.semanas.filter(x => x.id !== s.id)}); }} />
                </div>
              </div>

              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(160px, 1fr))', gap: 10, marginBottom: 16 }}>
                <MetaCard C={C} label="Meta questões" valor={s.metaQuestoes} editavel={editando === s.id}
                  onChange={v => atualizar(s.id, 'metaQuestoes', v)} />
                <MetaCard C={C} label="Meta flashcards" valor={s.metaFlashcards} editavel={editando === s.id}
                  onChange={v => atualizar(s.id, 'metaFlashcards', v)} />
                <MetaCard C={C} label="Meta artigos" valor={s.metaArtigos} editavel={editando === s.id}
                  onChange={v => atualizar(s.id, 'metaArtigos', v)} />
              </div>

              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(140px, 1fr))', gap: 8 }}>
                {s.dias.map((dia, i) => (
                  <div key={i} style={{
                    padding: 12, background: C.bg, borderRadius: 8, border: `1px solid ${C.borderSoft}`,
                    opacity: dia.concluido ? 0.6 : 1
                  }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
                      <strong style={{ fontSize: 12, color: C.text, letterSpacing: '0.05em' }}>{dia.nome}</strong>
                      <span style={{ fontSize: 10.5, color: C.textSoft }}>{normalizarTemasDoDia(dia).filter(t => t.concluido).length}/{normalizarTemasDoDia(dia).length}</span>
                    </div>
                    {editando === s.id ? (
                      <>
                        <textarea value={dia.temas} onChange={e => atualizarDia(s.id, i, 'temas', e.target.value)}
                          placeholder="Um tema por linha..." style={{
                            width: '100%', padding: 6, borderRadius: 4, border: `1px solid ${C.border}`,
                            background: C.card, color: C.text, fontSize: 12, minHeight: 60, resize: 'vertical'
                          }} />
                        <div style={{ fontSize: 10.5, color: C.textSoft, marginTop: 6 }}>Digite um tema por linha para marcar individualmente.</div>
                      </>
                    ) : (
                      normalizarTemasDoDia(dia).length ? (
                        <div style={{ display: 'flex', flexDirection: 'column', gap: 7 }}>
                          {normalizarTemasDoDia(dia).map((tema, j) => (
                            <label key={tema.id || j} style={{ display: 'flex', gap: 7, alignItems: 'flex-start', cursor: 'pointer' }}>
                              <input type="checkbox" checked={!!tema.concluido} onChange={e => atualizarTemaDia(s.id, i, j, e.target.checked)} style={{ marginTop: 2 }} />
                              <span style={{ fontSize: 12, color: tema.concluido ? C.textSoft : C.text, lineHeight: 1.4, textDecoration: tema.concluido ? 'line-through' : 'none' }}>{tema.titulo}</span>
                            </label>
                          ))}
                        </div>
                      ) : (
                        <div style={{ fontSize: 12, color: C.textSoft, lineHeight: 1.4 }}>—</div>
                      )
                    )}
                  </div>
                ))}
              </div>
            </Card>
          ))}
        </div>
      )}
    </div>
  );
}

const MetaCard = ({ C, label, valor, editavel, onChange }) => (
  <div style={{ padding: 12, background: C.bg, borderRadius: 8, border: `1px solid ${C.borderSoft}` }}>
    <div style={{ fontSize: 11, color: C.textSoft, fontWeight: 600,
      letterSpacing: '0.05em', textTransform: 'uppercase', marginBottom: 4 }}>{label}</div>
    {editavel ? (
      <input type="number" value={valor} onChange={e => onChange(parseInt(e.target.value) || 0)}
        style={{ width: '100%', fontSize: 22, fontFamily: 'Fraunces, serif', fontWeight: 600,
          color: C.accent, background: 'transparent', border: 'none', padding: 0 }} />
    ) : (
      <div style={{ fontSize: 24, fontFamily: 'Fraunces, serif', fontWeight: 600, color: C.accent }}>{valor}</div>
    )}
  </div>
);

// ============= ARTIGOS =============
function Artigos({ artigos, setArtigos, C }) {
  const artigoVazio = () => ({ titulo: '', tema: 'cardio', fonte: '', ano: new Date().getFullYear(), link: '', resumo: '', recomendacoes: '', praticos: '', mudaPratica: '', observacoes: '', tags: [] });
  const resumoVazio = () => ({ titulo: '', tema: 'cardio', subtema: '', conteudo: '', pontosChave: '', condutaProva: '', observacoes: '', dataCriacao: new Date().toISOString() });

  const [aba, setAba] = useState('artigos');
  const [editing, setEditing] = useState(null);
  const [showForm, setShowForm] = useState(false);
  const [filtroTema, setFiltroTema] = useState('todos');
  const [filtroAno, setFiltroAno] = useState('todos');
  const [form, setForm] = useState(artigoVazio());

  const [resumos, setResumos] = useState(() => storage.get('lumen_resumos_biblioteca', []));
  const [editingResumo, setEditingResumo] = useState(null);
  const [showResumoForm, setShowResumoForm] = useState(false);
  const [filtroResumoTema, setFiltroResumoTema] = useState('todos');
  const [filtroResumoSubtema, setFiltroResumoSubtema] = useState('todos');
  const [resumoForm, setResumoForm] = useState(resumoVazio());

  useEffect(() => { storage.set('lumen_resumos_biblioteca', resumos); }, [resumos]);

  const anos = [...new Set([...ANOS_QUESTOES, ...artigos.map(a => Number(a.ano)).filter(Boolean)])].sort((a,b)=>b-a);
  const filtrados = artigos.filter(a => (filtroTema === 'todos' || a.tema === filtroTema) && (filtroAno === 'todos' || String(a.ano) === filtroAno));

  const subtemasResumo = useMemo(() => {
    return [...new Set(resumos
      .filter(r => filtroResumoTema === 'todos' || r.tema === filtroResumoTema)
      .map(r => (r.subtema || '').trim())
      .filter(Boolean))].sort();
  }, [resumos, filtroResumoTema]);

  const resumosFiltrados = resumos.filter(r => {
    if (filtroResumoTema !== 'todos' && r.tema !== filtroResumoTema) return false;
    if (filtroResumoSubtema !== 'todos' && (r.subtema || '') !== filtroResumoSubtema) return false;
    return true;
  });

  const salvar = () => {
    if (!form.titulo.trim()) return;
    if (editing) setArtigos(artigos.map(a => a.id === editing ? { ...form, id: editing } : a));
    else setArtigos([{ ...form, id: 'a-' + Date.now() }, ...artigos]);
    setShowForm(false); setEditing(null); setForm(artigoVazio());
  };

  const salvarResumo = () => {
    if (!resumoForm.titulo.trim()) return;
    const payload = { ...resumoForm, subtema: String(resumoForm.subtema || '').trim(), dataAtualizacao: new Date().toISOString() };
    if (editingResumo) setResumos(resumos.map(r => r.id === editingResumo ? { ...payload, id: editingResumo } : r));
    else setResumos([{ ...payload, id: 'res-' + Date.now() }, ...resumos]);
    setShowResumoForm(false); setEditingResumo(null); setResumoForm(resumoVazio());
  };

  const excluirResumo = (id) => {
    if (confirm('Deseja realmente excluir este resumo?')) setResumos(resumos.filter(r => r.id !== id));
  };

  const AbaButton = ({ id, children }) => (
    <button onClick={() => setAba(id)} style={{
      padding: '9px 14px', borderRadius: 999, fontSize: 13, fontWeight: 700,
      background: aba === id ? C.accent : C.card, color: aba === id ? '#fff' : C.textMuted,
      border: `1px solid ${aba === id ? C.accent : C.borderSoft}`
    }}>{children}</button>
  );

  return <div className="lumen-fade-in">
    <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 12, flexWrap: 'wrap', gap: 10, alignItems: 'center' }}>
      <p style={{ color: C.textMuted, fontSize: 14, margin: 0 }}>Biblioteca para artigos, guidelines, diretrizes e resumos por especialidade.</p>
      <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
        <AbaButton id="artigos">Artigos/Guidelines</AbaButton>
        <AbaButton id="resumos">Resumos</AbaButton>
      </div>
    </div>

    {aba === 'artigos' && <>
      <div style={{ display: 'flex', gap: 8, marginBottom: 18, flexWrap: 'wrap', alignItems: 'center' }}>
        <Button C={C} icon={I.Plus} onClick={() => { setShowForm(true); setEditing(null); setForm(artigoVazio()); }}>Novo artigo/guideline</Button>
        <select value={filtroTema} onChange={e => setFiltroTema(e.target.value)} style={{ ...inputStyle(C), maxWidth: 240, padding: '8px 12px' }}><option value="todos">Todas as especialidades</option>{ESPECIALIDADES.map(t => <option key={t.id} value={t.id}>{t.nome}</option>)}</select>
        <select value={filtroAno} onChange={e => setFiltroAno(e.target.value)} style={{ ...inputStyle(C), maxWidth: 180, padding: '8px 12px' }}><option value="todos">Todos os anos</option>{anos.map(a => <option key={a} value={a}>{a}</option>)}</select>
      </div>
      {showForm && <Card C={C} style={{ marginBottom: 16 }}><h3 className="lumen-serif" style={{ fontSize: 18, margin: '0 0 14px' }}>{editing ? 'Editar' : 'Novo'} artigo/guideline</h3><FormInput C={C} label="Título" value={form.titulo} onChange={v => setForm({...form, titulo: v})} /><div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(150px, 1fr))', gap: 12, marginTop: 10 }}><div><FormLabel C={C}>Especialidade</FormLabel><select value={form.tema} onChange={e => setForm({...form, tema: e.target.value})} style={inputStyle(C)}>{ESPECIALIDADES.map(t => <option key={t.id} value={t.id}>{t.nome}</option>)}</select></div><FormInput C={C} label="Fonte" value={form.fonte} onChange={v => setForm({...form, fonte: v})} /><FormInput C={C} label="Ano" type="number" value={form.ano} onChange={v => setForm({...form, ano: parseInt(v) || ''})} /><FormInput C={C} label="Link" value={form.link} onChange={v => setForm({...form, link: v})} /></div><FormLabel C={C} style={{ marginTop: 12 }}>Resumo estruturado</FormLabel><textarea value={form.resumo} onChange={e => setForm({...form, resumo: e.target.value})} style={{ ...inputStyle(C), minHeight: 80 }} /><FormLabel C={C} style={{ marginTop: 12 }}>Principais recomendações</FormLabel><textarea value={form.recomendacoes} onChange={e => setForm({...form, recomendacoes: e.target.value})} style={{ ...inputStyle(C), minHeight: 80 }} /><FormLabel C={C} style={{ marginTop: 12 }}>Pontos práticos</FormLabel><textarea value={form.praticos} onChange={e => setForm({...form, praticos: e.target.value})} style={{ ...inputStyle(C), minHeight: 80 }} /><FormLabel C={C} style={{ marginTop: 12 }}>Condutas que mudam prática</FormLabel><textarea value={form.mudaPratica} onChange={e => setForm({...form, mudaPratica: e.target.value})} style={{ ...inputStyle(C), minHeight: 60 }} /><FormLabel C={C} style={{ marginTop: 12 }}>Observações pessoais</FormLabel><textarea value={form.observacoes} onChange={e => setForm({...form, observacoes: e.target.value})} style={{ ...inputStyle(C), minHeight: 60 }} /><div style={{ display: 'flex', gap: 8, marginTop: 14 }}><Button C={C} icon={I.Save} onClick={salvar}>Salvar</Button><Button C={C} variant="ghost" onClick={() => { setShowForm(false); setEditing(null); }}>Cancelar</Button></div></Card>}
      {filtrados.length === 0 && !showForm ? <Card C={C} style={{ textAlign: 'center', padding: 60 }}><I.BookMark size={32} /><div style={{ fontSize: 15, color: C.textMuted, marginTop: 12 }}>Nenhum item com esses filtros.</div></Card> : <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))', gap: 14 }}>{filtrados.map(a => { const tema = ESPECIALIDADES.find(t => t.id === a.tema); return <Card key={a.id} C={C} hover><div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8 }}>{tema && <Badge C={C}>{tema.nome}</Badge>}<div style={{ fontSize: 12, color: C.textSoft }}>{a.ano}</div></div><h4 className="lumen-serif" style={{ fontSize: 16, margin: '4px 0 6px', fontWeight: 500, color: C.text, lineHeight: 1.35 }}>{a.titulo}</h4><div style={{ fontSize: 12, color: C.textSoft, marginBottom: 10 }}>{a.fonte}</div>{a.resumo && <div style={{ fontSize: 13, color: C.textMuted, lineHeight: 1.55, display: '-webkit-box', WebkitLineClamp: 3, WebkitBoxOrient: 'vertical', overflow: 'hidden' }}>{a.resumo}</div>}<div style={{ display: 'flex', gap: 8, marginTop: 12, justifyContent: 'flex-end', alignItems: 'center' }}>{a.link && <a href={a.link} target="_blank" rel="noreferrer" style={{ fontSize: 11, color: C.accent, fontWeight: 600, marginRight: 'auto' }}>Ver fonte ↗</a>}<button onClick={() => { setForm(a); setEditing(a.id); setShowForm(true); }} style={{ padding: 4, color: C.textSoft, display: 'flex' }}><I.Edit size={13} /></button><button onClick={() => { if (confirm('Deseja realmente excluir este artigo/guideline?')) setArtigos(artigos.filter(x => x.id !== a.id)); }} style={{ padding: 4, color: C.textSoft, display: 'flex' }}><I.Trash size={13} /></button></div></Card>; })}</div>}
    </>}

    {aba === 'resumos' && <>
      <div style={{ display: 'flex', gap: 8, marginBottom: 18, flexWrap: 'wrap', alignItems: 'center' }}>
        <Button C={C} icon={I.Plus} onClick={() => { setShowResumoForm(true); setEditingResumo(null); setResumoForm(resumoVazio()); }}>Novo resumo</Button>
        <select value={filtroResumoTema} onChange={e => { setFiltroResumoTema(e.target.value); setFiltroResumoSubtema('todos'); }} style={{ ...inputStyle(C), maxWidth: 240, padding: '8px 12px' }}><option value="todos">Todas as especialidades</option>{ESPECIALIDADES.map(t => <option key={t.id} value={t.id}>{t.nome}</option>)}</select>
        <select value={filtroResumoSubtema} onChange={e => setFiltroResumoSubtema(e.target.value)} style={{ ...inputStyle(C), maxWidth: 240, padding: '8px 12px' }}><option value="todos">Todos os subtemas</option>{subtemasResumo.map(s => <option key={s} value={s}>{s}</option>)}</select>
      </div>

      {showResumoForm && <Card C={C} style={{ marginBottom: 16 }}>
        <h3 className="lumen-serif" style={{ fontSize: 18, margin: '0 0 14px' }}>{editingResumo ? 'Editar' : 'Novo'} resumo</h3>
        <FormInput C={C} label="Título do resumo" value={resumoForm.titulo} onChange={v => setResumoForm({...resumoForm, titulo: v})} />
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(180px, 1fr))', gap: 12, marginTop: 10 }}>
          <div><FormLabel C={C}>Especialidade</FormLabel><select value={resumoForm.tema} onChange={e => setResumoForm({...resumoForm, tema: e.target.value})} style={inputStyle(C)}>{ESPECIALIDADES.map(t => <option key={t.id} value={t.id}>{t.nome}</option>)}</select></div>
          <div><FormLabel C={C}>Subtema</FormLabel><input list="subtemas-resumos" value={resumoForm.subtema} onChange={e => setResumoForm({...resumoForm, subtema: e.target.value})} placeholder="Ex.: Hipercalcemia, Sepse, ICFEp..." style={inputStyle(C)} /><datalist id="subtemas-resumos">{[...new Set(resumos.map(r => r.subtema).filter(Boolean))].sort().map(s => <option key={s} value={s} />)}</datalist></div>
        </div>
        <FormLabel C={C} style={{ marginTop: 12 }}>Resumo</FormLabel><textarea value={resumoForm.conteudo} onChange={e => setResumoForm({...resumoForm, conteudo: e.target.value})} style={{ ...inputStyle(C), minHeight: 120 }} />
        <FormLabel C={C} style={{ marginTop: 12 }}>Pontos-chave</FormLabel><textarea value={resumoForm.pontosChave} onChange={e => setResumoForm({...resumoForm, pontosChave: e.target.value})} style={{ ...inputStyle(C), minHeight: 80 }} />
        <FormLabel C={C} style={{ marginTop: 12 }}>Dica de prova / pegadinhas</FormLabel><textarea value={resumoForm.condutaProva} onChange={e => setResumoForm({...resumoForm, condutaProva: e.target.value})} style={{ ...inputStyle(C), minHeight: 70 }} />
        <FormLabel C={C} style={{ marginTop: 12 }}>Observações pessoais</FormLabel><textarea value={resumoForm.observacoes} onChange={e => setResumoForm({...resumoForm, observacoes: e.target.value})} style={{ ...inputStyle(C), minHeight: 60 }} />
        <div style={{ display: 'flex', gap: 8, marginTop: 14 }}><Button C={C} icon={I.Save} onClick={salvarResumo}>Salvar resumo</Button><Button C={C} variant="ghost" onClick={() => { setShowResumoForm(false); setEditingResumo(null); }}>Cancelar</Button></div>
      </Card>}

      {resumosFiltrados.length === 0 && !showResumoForm ? <Card C={C} style={{ textAlign: 'center', padding: 60 }}><I.File size={32} /><div style={{ fontSize: 15, color: C.textMuted, marginTop: 12 }}>Nenhum resumo cadastrado. Clique em “Novo resumo”.</div></Card> : <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(300px, 1fr))', gap: 14 }}>{resumosFiltrados.map(r => { const tema = ESPECIALIDADES.find(t => t.id === r.tema); return <Card key={r.id} C={C} hover><div style={{ display: 'flex', gap: 6, justifyContent: 'space-between', marginBottom: 8, alignItems: 'center' }}><div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>{tema && <Badge C={C}>{tema.nome}</Badge>}{r.subtema && <Badge C={C} color="soft">{r.subtema}</Badge>}</div></div><h4 className="lumen-serif" style={{ fontSize: 17, margin: '4px 0 8px', fontWeight: 500, color: C.text, lineHeight: 1.35 }}>{r.titulo}</h4>{r.conteudo && <div style={{ fontSize: 13, color: C.textMuted, lineHeight: 1.55, display: '-webkit-box', WebkitLineClamp: 4, WebkitBoxOrient: 'vertical', overflow: 'hidden', marginBottom: 8 }}>{r.conteudo}</div>}{r.condutaProva && <div style={{ padding: 10, borderRadius: 8, background: C.accentSoft, color: C.accent, fontSize: 12.5, lineHeight: 1.45, marginTop: 8 }}><strong>Dica de prova:</strong> {r.condutaProva}</div>}<div style={{ display: 'flex', gap: 8, marginTop: 12, justifyContent: 'flex-end' }}><button onClick={() => { setResumoForm(r); setEditingResumo(r.id); setShowResumoForm(true); }} style={{ padding: 4, color: C.textSoft, display: 'flex' }} title="Editar resumo"><I.Edit size={13} /></button><button onClick={() => excluirResumo(r.id)} style={{ padding: 4, color: C.textSoft, display: 'flex' }} title="Excluir resumo"><I.Trash size={13} /></button></div></Card>; })}</div>}
    </>}
  </div>;
}


// ============= CALCULADORAS & ESCORES =============
function CalculadorasEscores({ calculadoras, setCalculadoras, C }) {
  const itemVazio = () => ({ id: 'calc-' + Date.now(), nome: '', especialidade: ESPECIALIDADES[0]?.id || 'outros', subtema: '', tipo: 'Calculadora', formula: '', interpretacao: '', observacoes: '' });
  const [showForm, setShowForm] = useState(false);
  const [editing, setEditing] = useState(null);
  const [form, setForm] = useState(itemVazio());
  const [filtroTema, setFiltroTema] = useState('todos');
  const [filtroTipo, setFiltroTipo] = useState('todos');
  const [filtroSubtema, setFiltroSubtema] = useState('todos');

  const subtemas = useMemo(() => [...new Set((calculadoras || []).map(c => c.subtema).filter(Boolean))].sort(), [calculadoras]);
  const filtradas = useMemo(() => (calculadoras || []).filter(c => {
    if (filtroTema !== 'todos' && c.especialidade !== filtroTema) return false;
    if (filtroTipo !== 'todos' && c.tipo !== filtroTipo) return false;
    if (filtroSubtema !== 'todos' && c.subtema !== filtroSubtema) return false;
    return true;
  }), [calculadoras, filtroTema, filtroTipo, filtroSubtema]);

  const salvar = () => {
    if (!form.nome.trim()) return alert('Preencha o nome da calculadora/escore.');
    const item = { ...form, atualizadoEm: new Date().toISOString() };
    if (editing) setCalculadoras(calculadoras.map(c => c.id === editing ? item : c));
    else setCalculadoras([item, ...(calculadoras || [])]);
    setShowForm(false); setEditing(null); setForm(itemVazio());
  };
  const excluir = (id) => { if (confirm('Deseja realmente excluir esta calculadora/escore?')) setCalculadoras((calculadoras || []).filter(c => c.id !== id)); };

  return <div className="lumen-fade-in">
    <div style={{ display: 'flex', gap: 8, marginBottom: 18, flexWrap: 'wrap', alignItems: 'center' }}>

      <select value={filtroTema} onChange={e => { setFiltroTema(e.target.value); setFiltroSubtema('todos'); }} style={{ ...inputStyle(C), maxWidth: 240, padding: '8px 12px' }}><option value="todos">Todas as especialidades</option>{ESPECIALIDADES.map(t => <option key={t.id} value={t.id}>{t.nome}</option>)}</select>
      <select value={filtroTipo} onChange={e => setFiltroTipo(e.target.value)} style={{ ...inputStyle(C), maxWidth: 190, padding: '8px 12px' }}><option value="todos">Todos os tipos</option><option>Calculadora</option><option>Escore</option><option>Critério diagnóstico</option><option>Classificação</option></select>
      <select value={filtroSubtema} onChange={e => setFiltroSubtema(e.target.value)} style={{ ...inputStyle(C), maxWidth: 220, padding: '8px 12px' }}><option value="todos">Todos os subtemas</option>{subtemas.map(s => <option key={s} value={s}>{s}</option>)}</select>
    </div>
    {showForm && <Card C={C} style={{ marginBottom: 16 }}>
      <h3 className="lumen-serif" style={{ fontSize: 18, margin: '0 0 14px' }}>{editing ? 'Editar' : 'Nova'} calculadora/escore</h3>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(180px, 1fr))', gap: 12 }}>
        <FormInput C={C} label="Nome" value={form.nome} onChange={v => setForm({...form, nome: v})} />
        <div><FormLabel C={C}>Especialidade</FormLabel><select value={form.especialidade} onChange={e => setForm({...form, especialidade: e.target.value})} style={inputStyle(C)}>{ESPECIALIDADES.map(t => <option key={t.id} value={t.id}>{t.nome}</option>)}</select></div>
        <div><FormLabel C={C}>Tipo</FormLabel><select value={form.tipo} onChange={e => setForm({...form, tipo: e.target.value})} style={inputStyle(C)}><option>Calculadora</option><option>Escore</option><option>Critério diagnóstico</option><option>Classificação</option></select></div>
        <div><FormLabel C={C}>Subtema</FormLabel><input list="subtemas-calculadoras" value={form.subtema} onChange={e => setForm({...form, subtema: e.target.value})} placeholder="Ex.: Sepse, DRC, TEP..." style={inputStyle(C)} /><datalist id="subtemas-calculadoras">{subtemas.map(s => <option key={s} value={s} />)}</datalist></div>
      </div>
      <FormLabel C={C} style={{ marginTop: 12 }}>Fórmula / variáveis / passo a passo</FormLabel><textarea value={form.formula} onChange={e => setForm({...form, formula: e.target.value})} style={{ ...inputStyle(C), minHeight: 90 }} placeholder="Ex.: Critérios, pontos por variável, cálculo..." />
      <FormLabel C={C} style={{ marginTop: 12 }}>Interpretação do resultado</FormLabel><textarea value={form.interpretacao} onChange={e => setForm({...form, interpretacao: e.target.value})} style={{ ...inputStyle(C), minHeight: 80 }} placeholder="Ex.: baixo/intermediário/alto risco; conduta sugerida..." />
      <FormLabel C={C} style={{ marginTop: 12 }}>Observações / dica de prova</FormLabel><textarea value={form.observacoes} onChange={e => setForm({...form, observacoes: e.target.value})} style={{ ...inputStyle(C), minHeight: 70 }} />
      <div style={{ display: 'flex', gap: 8, marginTop: 14 }}><Button C={C} icon={I.Save} onClick={salvar}>Salvar</Button><Button C={C} variant="ghost" onClick={() => { setShowForm(false); setEditing(null); }}>Cancelar</Button></div>
    </Card>}
    {filtradas.length === 0 && !showForm ? <Card C={C} style={{ textAlign: 'center', padding: 60 }}><I.Target size={34} /><div style={{ fontSize: 15, color: C.textMuted, marginTop: 12 }}>Nenhuma calculadora/escore cadastrado. Clique em “Nova calculadora/escore”.</div></Card> : <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(310px, 1fr))', gap: 14 }}>{filtradas.map(c => { const tema = ESPECIALIDADES.find(t => t.id === c.especialidade); return <Card key={c.id} C={C} hover><div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginBottom: 8 }}>{tema && <Badge C={C}>{tema.nome}</Badge>}<Badge C={C} color="soft">{c.tipo}</Badge>{c.subtema && <Badge C={C} color="soft">{c.subtema}</Badge>}</div><h4 className="lumen-serif" style={{ fontSize: 18, margin: '4px 0 8px', fontWeight: 500, color: C.text }}>{c.nome}</h4>{c.formula && <div style={{ fontSize: 13, color: C.textMuted, lineHeight: 1.55, whiteSpace: 'pre-wrap', marginBottom: 8 }}><strong>Como calcular:</strong><br />{c.formula}</div>}{c.interpretacao && <div style={{ padding: 10, borderRadius: 8, background: C.bg, border: `1px solid ${C.borderSoft}`, fontSize: 13, lineHeight: 1.5, color: C.textMuted, whiteSpace: 'pre-wrap' }}>{c.interpretacao}</div>}{c.observacoes && <div style={{ marginTop: 8, fontSize: 12.5, color: C.accent, lineHeight: 1.45 }}><strong>Dica:</strong> {c.observacoes}</div>}<div style={{ display: 'flex', gap: 8, marginTop: 12, justifyContent: 'flex-end' }}><button onClick={() => { setForm(c); setEditing(c.id); setShowForm(true); }} style={{ padding: 4, color: C.textSoft, display: 'flex' }} title="Editar"><I.Edit size={13} /></button><button onClick={() => excluir(c.id)} style={{ padding: 4, color: C.textSoft, display: 'flex' }} title="Excluir"><I.Trash size={13} /></button></div></Card>; })}</div>}
  </div>;
}

// ============= GUIA DE ANTIMICROBIANOS =============
function GuiaAntimicrobianos({ antimicrobianos, setAntimicrobianos, C }) {
  const itemVazio = () => ({ id: 'atb-' + Date.now(), tipo: 'Agente etiológico', agente: '', classe: '', antibiotico: '', cobertura: '', resistencia: '', mecanismoAcao: '', observacoes: '' });
  const tabelaVazia = () => ({
    columns: ['Microrganismo', 'Classe', 'Antibiótico', 'Cobertura', 'Observações'],
    rows: []
  });
  const [showForm, setShowForm] = useState(false);
  const [editing, setEditing] = useState(null);
  const [form, setForm] = useState(itemVazio());
  const [filtroTipo, setFiltroTipo] = useState('todos');
  const [busca, setBusca] = useState('');
  const [showTabela, setShowTabela] = useState(false);
  const [tabela, setTabela] = useState(() => storage.get('lumen_tabela_cobertura_antimicrobiana', tabelaVazia()));
  const [filtroTabela, setFiltroTabela] = useState('');

  useEffect(() => { storage.set('lumen_tabela_cobertura_antimicrobiana', tabela); }, [tabela]);

  const filtrados = useMemo(() => (antimicrobianos || []).filter(a => {
    if (filtroTipo !== 'todos' && a.tipo !== filtroTipo) return false;
    const q = busca.toLowerCase().trim();
    if (!q) return true;
    return [a.agente, a.classe, a.antibiotico, a.cobertura, a.resistencia, a.mecanismoAcao, a.doseHabitual].some(v => String(v || '').toLowerCase().includes(q));
  }), [antimicrobianos, filtroTipo, busca]);

  const linhasFiltradasTabela = useMemo(() => {
    const q = filtroTabela.toLowerCase().trim();
    if (!q) return tabela.rows || [];
    return (tabela.rows || []).filter(row => (row || []).some(cell => String(cell || '').toLowerCase().includes(q)));
  }, [tabela, filtroTabela]);

  const salvar = () => {
    if (!form.agente.trim() && !form.classe.trim() && !form.antibiotico.trim()) return alert('Preencha pelo menos agente etiológico, classe ou antibiótico.');
    const item = { ...form, mecanismoAcao: form.mecanismoAcao || form.doseHabitual || '', atualizadoEm: new Date().toISOString() };
    delete item.doseHabitual;
    if (editing) setAntimicrobianos(antimicrobianos.map(a => a.id === editing ? item : a));
    else setAntimicrobianos([item, ...(antimicrobianos || [])]);
    setShowForm(false); setEditing(null); setForm(itemVazio());
  };
  const excluir = (id) => { if (confirm('Deseja realmente excluir este registro do guia de antimicrobianos?')) setAntimicrobianos((antimicrobianos || []).filter(a => a.id !== id)); };

  const atualizarCelula = (rowIndexOriginal, colIndex, valor) => {
    setTabela(t => ({ ...t, rows: (t.rows || []).map((row, idx) => idx === rowIndexOriginal ? (t.columns || []).map((_, c) => c === colIndex ? valor : (row?.[c] || '')) : row) }));
  };
  const adicionarLinha = () => setTabela(t => ({ ...t, rows: [...(t.rows || []), (t.columns || []).map(() => '')] }));
  const excluirLinha = (idxOriginal) => { if (confirm('Deseja excluir esta linha da planilha?')) setTabela(t => ({ ...t, rows: (t.rows || []).filter((_, i) => i !== idxOriginal) })); };
  const adicionarColuna = () => {
    const nome = prompt('Nome da nova coluna:');
    if (!nome?.trim()) return;
    setTabela(t => ({ columns: [...(t.columns || []), nome.trim()], rows: (t.rows || []).map(r => [...(r || []), '']) }));
  };
  const renomearColuna = (idx, nome) => setTabela(t => ({ ...t, columns: (t.columns || []).map((c, i) => i === idx ? nome : c) }));
  const excluirColuna = (idx) => {
    if ((tabela.columns || []).length <= 1) return alert('A planilha precisa manter pelo menos uma coluna.');
    if (!confirm('Deseja excluir esta coluna?')) return;
    setTabela(t => ({ columns: (t.columns || []).filter((_, i) => i !== idx), rows: (t.rows || []).map(r => (r || []).filter((_, i) => i !== idx)) }));
  };
  const limparTabela = () => { if (confirm('Deseja limpar todas as linhas da planilha? As colunas serão mantidas.')) setTabela(t => ({ ...t, rows: [] })); };

  return <div className="lumen-fade-in">
    <Card C={C} style={{ marginBottom: 16, display: 'flex', gap: 12, flexWrap: 'wrap', alignItems: 'center', justifyContent: 'space-between' }}>
      <div><h3 className="lumen-serif" style={{ fontSize: 20, margin: '0 0 4px' }}>Guia pessoal de antimicrobianos</h3><div style={{ fontSize: 13, color: C.textMuted }}>Organize por agente etiológico, classe/antibiótico, mecanismo de ação e cobertura de microrganismos.</div></div>
      <Button C={C} icon={I.File} onClick={() => setShowTabela(!showTabela)}>{showTabela ? 'Fechar filtro/planilha' : 'Abrir filtro/planilha de cobertura'}</Button>
    </Card>

    {showTabela && <Card C={C} style={{ marginBottom: 16 }}>
      <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
        <div>
          <h3 className="lumen-serif" style={{ fontSize: 18, margin: 0 }}>Planilha interna de cobertura</h3>
          <div style={{ fontSize: 12.5, color: C.textMuted, marginTop: 3 }}>Tabela em branco/editável para você criar as colunas e linhas conforme necessidade. Os dados ficam salvos neste navegador.</div>
        </div>
        <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
          <Button C={C} size="sm" icon={I.Plus} onClick={adicionarLinha}>Adicionar linha</Button>
          <Button C={C} size="sm" variant="secondary" icon={I.Plus} onClick={adicionarColuna}>Adicionar coluna</Button>
          <Button C={C} size="sm" variant="danger" icon={I.Trash} onClick={limparTabela}>Limpar linhas</Button>
        </div>
      </div>
      <input value={filtroTabela} onChange={e => setFiltroTabela(e.target.value)} placeholder="Filtrar na planilha por microrganismo, classe, antibiótico ou cobertura..." style={{ ...inputStyle(C), padding: '8px 12px', marginBottom: 12 }} />
      <div className="lumen-scroll" style={{ overflowX: 'auto', border: `1px solid ${C.borderSoft}`, borderRadius: 10 }}>
        <table style={{ width: '100%', minWidth: 820, borderCollapse: 'collapse', fontSize: 13 }}>
          <thead>
            <tr style={{ background: C.bg }}>
              {(tabela.columns || []).map((col, idx) => <th key={idx} style={{ padding: 8, borderBottom: `1px solid ${C.borderSoft}`, borderRight: `1px solid ${C.borderSoft}`, textAlign: 'left', minWidth: 150 }}>
                <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
                  <input value={col} onChange={e => renomearColuna(idx, e.target.value)} style={{ ...inputStyle(C), padding: '6px 8px', fontWeight: 700 }} />
                  <button title="Excluir coluna" onClick={() => excluirColuna(idx)} style={{ color: C.textSoft, padding: 4, display: 'flex' }}><I.X size={12} /></button>
                </div>
              </th>)}
              <th style={{ width: 48, padding: 8, borderBottom: `1px solid ${C.borderSoft}` }}></th>
            </tr>
          </thead>
          <tbody>
            {linhasFiltradasTabela.length === 0 ? <tr><td colSpan={(tabela.columns || []).length + 1} style={{ padding: 24, color: C.textSoft, textAlign: 'center' }}>Nenhuma linha. Clique em “Adicionar linha”.</td></tr> : linhasFiltradasTabela.map((row, visibleIdx) => {
              const idxOriginal = (tabela.rows || []).indexOf(row);
              return <tr key={idxOriginal}>
                {(tabela.columns || []).map((_, colIdx) => <td key={colIdx} style={{ padding: 6, borderBottom: `1px solid ${C.borderSoft}`, borderRight: `1px solid ${C.borderSoft}` }}>
                  <textarea value={row?.[colIdx] || ''} onChange={e => atualizarCelula(idxOriginal, colIdx, e.target.value)} style={{ ...inputStyle(C), minHeight: 42, resize: 'vertical', padding: '7px 8px' }} />
                </td>)}
                <td style={{ padding: 6, borderBottom: `1px solid ${C.borderSoft}`, textAlign: 'center' }}><button title="Excluir linha" onClick={() => excluirLinha(idxOriginal)} style={{ color: C.error, padding: 6 }}><I.Trash size={13} /></button></td>
              </tr>;
            })}
          </tbody>
        </table>
      </div>
    </Card>}

    <div style={{ display: 'flex', gap: 8, marginBottom: 18, flexWrap: 'wrap', alignItems: 'center' }}>
      <Button C={C} icon={I.Plus} onClick={() => { setShowForm(true); setEditing(null); setForm(itemVazio()); }}>Novo registro</Button>
      <select value={filtroTipo} onChange={e => setFiltroTipo(e.target.value)} style={{ ...inputStyle(C), maxWidth: 260, padding: '8px 12px' }}><option value="todos">Todos os formatos</option><option>Agente etiológico</option><option>Classe de antibiótico</option><option>Antibiótico específico</option></select>
      <input value={busca} onChange={e => setBusca(e.target.value)} placeholder="Buscar agente, classe, antibiótico..." style={{ ...inputStyle(C), maxWidth: 340, padding: '8px 12px' }} />
    </div>
    {showForm && <Card C={C} style={{ marginBottom: 16 }}>
      <h3 className="lumen-serif" style={{ fontSize: 18, margin: '0 0 14px' }}>{editing ? 'Editar' : 'Novo'} registro</h3>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(180px, 1fr))', gap: 12 }}>
        <div><FormLabel C={C}>Tipo de organização</FormLabel><select value={form.tipo} onChange={e => setForm({...form, tipo: e.target.value})} style={inputStyle(C)}><option>Agente etiológico</option><option>Classe de antibiótico</option><option>Antibiótico específico</option></select></div>
        <FormInput C={C} label="Agente etiológico / microrganismo" value={form.agente} onChange={v => setForm({...form, agente: v})} />
        <FormInput C={C} label="Classe" value={form.classe} onChange={v => setForm({...form, classe: v})} />
        <FormInput C={C} label="Nome do antibiótico" value={form.antibiotico} onChange={v => setForm({...form, antibiotico: v})} />
      </div>
      <FormLabel C={C} style={{ marginTop: 12 }}>Cobertura / espectro</FormLabel><textarea value={form.cobertura} onChange={e => setForm({...form, cobertura: e.target.value})} style={{ ...inputStyle(C), minHeight: 90 }} placeholder="Ex.: Gram positivos, Gram negativos, anaeróbios, Pseudomonas, MRSA..." />
      <FormLabel C={C} style={{ marginTop: 12 }}>Resistências / não cobre</FormLabel><textarea value={form.resistencia} onChange={e => setForm({...form, resistencia: e.target.value})} style={{ ...inputStyle(C), minHeight: 70 }} placeholder="Ex.: não cobre MRSA, ESBL, KPC; resistência intrínseca..." />
      <FormLabel C={C} style={{ marginTop: 12 }}>Mecanismo de ação</FormLabel><textarea value={form.mecanismoAcao || form.doseHabitual || ''} onChange={e => setForm({...form, mecanismoAcao: e.target.value})} style={{ ...inputStyle(C), minHeight: 70 }} placeholder="Ex.: inibe síntese de parede celular; liga-se à subunidade 50S; inibe DNA girase/topoisomerase..." />
      <FormLabel C={C} style={{ marginTop: 12 }}>Observações pessoais</FormLabel><textarea value={form.observacoes} onChange={e => setForm({...form, observacoes: e.target.value})} style={{ ...inputStyle(C), minHeight: 60 }} />
      <div style={{ display: 'flex', gap: 8, marginTop: 14 }}><Button C={C} icon={I.Save} onClick={salvar}>Salvar</Button><Button C={C} variant="ghost" onClick={() => { setShowForm(false); setEditing(null); }}>Cancelar</Button></div>
    </Card>}
    {filtrados.length === 0 && !showForm ? <Card C={C} style={{ textAlign: 'center', padding: 60 }}><I.Activity size={34} /><div style={{ fontSize: 15, color: C.textMuted, marginTop: 12 }}>Nenhum registro cadastrado. Clique em “Novo registro”.</div></Card> : <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(320px, 1fr))', gap: 14 }}>{filtrados.map(a => <Card key={a.id} C={C} hover><div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginBottom: 8 }}><Badge C={C}>{a.tipo}</Badge>{a.classe && <Badge C={C} color="soft">{a.classe}</Badge>}</div><h4 className="lumen-serif" style={{ fontSize: 18, margin: '4px 0 8px', fontWeight: 500, color: C.text }}>{a.antibiotico || a.agente || a.classe}</h4>{a.agente && <div style={{ fontSize: 12.5, color: C.textSoft, marginBottom: 6 }}><strong>Agente:</strong> {a.agente}</div>}{a.cobertura && <div style={{ fontSize: 13, color: C.textMuted, lineHeight: 1.55, whiteSpace: 'pre-wrap' }}><strong>Cobertura:</strong><br />{a.cobertura}</div>}{a.resistencia && <div style={{ marginTop: 8, padding: 10, borderRadius: 8, background: C.error + '12', color: C.error, fontSize: 12.5, lineHeight: 1.45, whiteSpace: 'pre-wrap' }}><strong>Não cobre / atenção:</strong><br />{a.resistencia}</div>}{(a.mecanismoAcao || a.doseHabitual) && <div style={{ marginTop: 8, fontSize: 12.5, color: C.textMuted, whiteSpace: 'pre-wrap' }}><strong>Mecanismo de ação:</strong> {a.mecanismoAcao || a.doseHabitual}</div>}<div style={{ display: 'flex', gap: 8, marginTop: 12, justifyContent: 'flex-end' }}><button onClick={() => { setForm({ ...a, mecanismoAcao: a.mecanismoAcao || a.doseHabitual || '' }); setEditing(a.id); setShowForm(true); }} style={{ padding: 4, color: C.textSoft, display: 'flex' }} title="Editar"><I.Edit size={13} /></button><button onClick={() => excluir(a.id)} style={{ padding: 4, color: C.textSoft, display: 'flex' }} title="Excluir"><I.Trash size={13} /></button></div></Card>)}</div>}
  </div>;
}

// ============= MEDICAMENTOS =============
function Medicamentos({ medicamentos, setMedicamentos, C }) {
  const [filtroCategoria, setFiltroCategoria] = useState('todas');
  const [filtroEsp, setFiltroEsp] = useState('todas');
  const [filtroDoenca, setFiltroDoenca] = useState('todas');
  const [busca, setBusca] = useState('');
  const [sidebarOpen, setSidebarOpen] = useState(true);
  const [showForm, setShowForm] = useState(false);
  const [editing, setEditing] = useState(null);
  const [form, setForm] = useState({ nome: '', classe: '', categoria: 'Antibióticos', especialidade: 'infecto', doenca: '', prescricao: '', indicacao: '', dose: '', diluicao: '', velocidade: '', doseMax: '', ajusteRenal: '', cuidados: '', obs: '', tags: [] });

  const doencas = [...new Set(medicamentos
    .filter(m => filtroEsp === 'todas' || (m.especialidade || m.tema || 'outros') === filtroEsp)
    .map(m => m.doenca).filter(Boolean))].sort();
  const especialidadesComQtd = ESPECIALIDADES.map(e => ({ ...e, qtd: medicamentos.filter(m => (m.especialidade || m.tema || 'outros') === e.id).length }));
  const doencasPorEspecialidade = (espId) => [...new Set(medicamentos.filter(m => (m.especialidade || m.tema || 'outros') === espId).map(m => m.doenca).filter(Boolean))].sort();

  const filtrados = medicamentos.filter(m => {
    if (filtroCategoria !== 'todas' && m.categoria !== filtroCategoria) return false;
    if (filtroEsp !== 'todas' && (m.especialidade || m.tema || 'outros') !== filtroEsp) return false;
    if (filtroDoenca !== 'todas') {
      if (filtroDoenca === '__sem_doenca__') { if (m.doenca) return false; }
      else if ((m.doenca || '') !== filtroDoenca) return false;
    }
    const texto = `${m.nome} ${m.classe || ''} ${m.categoria || ''} ${m.indicacao || ''} ${m.doenca || ''} ${m.prescricao || ''}`.toLowerCase();
    if (busca && !texto.includes(busca.toLowerCase())) return false;
    return true;
  });

  const salvar = () => {
    if (!form.nome.trim() && !form.doenca.trim() && !form.prescricao.trim()) return;
    const item = { ...form, nome: form.nome.trim() || form.doenca.trim() || 'Prescrição sem nome' };
    if (editing) setMedicamentos(medicamentos.map(m => m.id === editing ? { ...item, id: editing } : m));
    else setMedicamentos([{ ...item, id: 'med-' + Date.now() }, ...medicamentos]);
    setShowForm(false); setEditing(null);
    setForm({ nome: '', classe: '', categoria: (filtroDoenca !== 'todas' && filtroDoenca !== '__sem_doenca__') ? 'Prescrições por doença' : '', especialidade: filtroEsp !== 'todas' ? filtroEsp : 'infecto', doenca: filtroDoenca !== 'todas' && filtroDoenca !== '__sem_doenca__' ? filtroDoenca : '', prescricao: '', indicacao: '', dose: '', diluicao: '', velocidade: '', doseMax: '', ajusteRenal: '', cuidados: '', obs: '', tags: [] });
  };

  const abrirNovaPrescricao = (esp = filtroEsp, doenca = '') => {
    setForm({ nome: '', classe: '', categoria: (doenca && doenca !== '__sem_doenca__') ? 'Prescrições por doença' : '', especialidade: esp !== 'todas' ? esp : 'infecto', doenca: doenca === '__sem_doenca__' ? '' : doenca, prescricao: '', indicacao: '', dose: '', diluicao: '', velocidade: '', doseMax: '', ajusteRenal: '', cuidados: '', obs: '', tags: [] });
    setEditing(null); setShowForm(true);
  };

  return <div className="lumen-fade-in">
    <div style={{ display: 'grid', gridTemplateColumns: sidebarOpen ? 'minmax(0, 1fr) 290px' : 'minmax(0, 1fr) 46px', gap: 16, alignItems: 'start' }}>
      <div style={{ minWidth: 0 }}>
        <div style={{ display: 'flex', gap: 10, marginBottom: 16, flexWrap: 'wrap' }}>
          <Button C={C} icon={I.Plus} onClick={() => abrirNovaPrescricao()}>Nova medicação/prescrição</Button>
          <input value={busca} onChange={e => setBusca(e.target.value)} placeholder="Buscar por droga, doença ou prescrição..." style={{ ...inputStyle(C), maxWidth: 320, padding: '8px 12px' }} />
        </div>
        <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginBottom: 12 }}><button onClick={() => setFiltroCategoria('todas')} style={pillStyle(C, filtroCategoria === 'todas')}>Todas categorias</button>{CATEGORIAS_MED.map(c => <button key={c} onClick={() => setFiltroCategoria(c)} style={pillStyle(C, filtroCategoria === c)}>{c}</button>)}</div>
        <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', marginBottom: 18 }}>
          <select value={filtroEsp} onChange={e => { setFiltroEsp(e.target.value); setFiltroDoenca('todas'); }} style={{ ...inputStyle(C), maxWidth: 240, padding: '8px 12px' }}><option value="todas">Todas as especialidades</option>{ESPECIALIDADES.map(t => <option key={t.id} value={t.id}>{t.nome}</option>)}</select>
          <select value={filtroDoenca} onChange={e => setFiltroDoenca(e.target.value)} style={{ ...inputStyle(C), maxWidth: 260, padding: '8px 12px' }}><option value="todas">Doenças e medicamentos mais utilizados</option><option value="__sem_doenca__">Medicamentos mais utilizados</option>{doencas.map(d => <option key={d}>{d}</option>)}</select>
        </div>

        {showForm && <Card C={C} style={{ marginBottom: 16 }}><h3 className="lumen-serif" style={{ fontSize: 18, margin: '0 0 14px' }}>{editing ? 'Editar' : 'Nova'} medicação/prescrição</h3><div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(180px, 1fr))', gap: 12 }}><FormInput C={C} label="Nome da medicação/prescrição" value={form.nome} onChange={v => setForm({...form, nome: v})} /><FormInput C={C} label="Classe" value={form.classe} onChange={v => setForm({...form, classe: v})} /><div><FormLabel C={C}>Categoria</FormLabel><select value={form.categoria || ''} onChange={e => setForm({...form, categoria: e.target.value})} style={inputStyle(C)}><option value="">Sem categoria</option>{CATEGORIAS_MED.map(c => <option key={c}>{c}</option>)}</select></div><div><FormLabel C={C}>Especialidade</FormLabel><select value={form.especialidade || 'infecto'} onChange={e => setForm({...form, especialidade: e.target.value})} style={inputStyle(C)}>{ESPECIALIDADES.map(t => <option key={t.id} value={t.id}>{t.nome}</option>)}</select></div><FormInput C={C} label="Doença/condição (opcional; deixe vazio para medicamentos mais utilizados)" value={form.doenca || ''} onChange={v => setForm({...form, doenca: v})} /></div><FormLabel C={C} style={{ marginTop: 12 }}>Prescrição / medicamentos mais utilizados</FormLabel><textarea value={form.prescricao || ''} onChange={e => setForm({...form, prescricao: e.target.value})} placeholder="Ex.: Pneumonia comunitária: ceftriaxona + azitromicina..." style={{ ...inputStyle(C), minHeight: 100 }} /><FormLabel C={C} style={{ marginTop: 12 }}>Indicação</FormLabel><textarea value={form.indicacao} onChange={e => setForm({...form, indicacao: e.target.value})} style={{ ...inputStyle(C), minHeight: 50 }} /><div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(180px, 1fr))', gap: 12, marginTop: 12 }}><FormInput C={C} label="Dose usual" value={form.dose} onChange={v => setForm({...form, dose: v})} /><FormInput C={C} label="Dose máxima" value={form.doseMax} onChange={v => setForm({...form, doseMax: v})} /><FormInput C={C} label="Ajuste renal" value={form.ajusteRenal} onChange={v => setForm({...form, ajusteRenal: v})} /></div><FormLabel C={C} style={{ marginTop: 12 }}>Diluição</FormLabel><textarea value={form.diluicao} onChange={e => setForm({...form, diluicao: e.target.value})} style={{ ...inputStyle(C), minHeight: 50 }} /><FormLabel C={C} style={{ marginTop: 12 }}>Velocidade de infusão</FormLabel><textarea value={form.velocidade} onChange={e => setForm({...form, velocidade: e.target.value})} style={{ ...inputStyle(C), minHeight: 40 }} /><FormLabel C={C} style={{ marginTop: 12 }}>Cuidados e contraindicações</FormLabel><textarea value={form.cuidados} onChange={e => setForm({...form, cuidados: e.target.value})} style={{ ...inputStyle(C), minHeight: 60 }} /><FormLabel C={C} style={{ marginTop: 12 }}>Observações</FormLabel><textarea value={form.obs} onChange={e => setForm({...form, obs: e.target.value})} style={{ ...inputStyle(C), minHeight: 50 }} /><div style={{ display: 'flex', gap: 8, marginTop: 14 }}><Button C={C} icon={I.Save} onClick={salvar}>Salvar</Button><Button C={C} variant="ghost" onClick={() => { setShowForm(false); setEditing(null); }}>Cancelar</Button></div></Card>}
        {filtrados.length === 0 ? <Card C={C} style={{ textAlign: 'center', padding: 60 }}><I.Pill size={32} /><div style={{ fontSize: 15, color: C.textMuted, marginTop: 12 }}>Nenhum medicamento/prescrição com esses filtros.</div></Card> : <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>{filtrados.map(m => <MedCard key={m.id} m={m} C={C} onEdit={() => { setForm({...m, especialidade: m.especialidade || m.tema || 'infecto'}); setEditing(m.id); setShowForm(true); }} onDelete={() => { if (confirm('Deletar?')) setMedicamentos(medicamentos.filter(x => x.id !== m.id)); }} />)}</div>}
      </div>

      <aside style={{ position: 'sticky', top: 82, alignSelf: 'start' }}>
        <Card C={C} style={{ padding: sidebarOpen ? 14 : 8 }}>
          <button onClick={() => setSidebarOpen(!sidebarOpen)} style={{ width: '100%', display: 'flex', justifyContent: sidebarOpen ? 'space-between' : 'center', alignItems: 'center', color: C.text, fontWeight: 700 }}>
            {sidebarOpen && <span>Especialidades</span>}{sidebarOpen ? <I.ChevR size={15} /> : <I.ChevL size={15} />}
          </button>
          {sidebarOpen && <div style={{ marginTop: 12, display: 'flex', flexDirection: 'column', gap: 6 }}>
            <button onClick={() => { setFiltroEsp('todas'); setFiltroDoenca('todas'); }} style={{ ...pillStyle(C, filtroEsp === 'todas'), textAlign: 'left', borderRadius: 8 }}>Todas ({medicamentos.length})</button>
            {especialidadesComQtd.map(e => <div key={e.id} style={{ border: `1px solid ${filtroEsp === e.id ? C.accent : C.borderSoft}`, borderRadius: 10, padding: 8, background: filtroEsp === e.id ? C.accentSoft : 'transparent' }}>
              <button onClick={() => { setFiltroEsp(e.id); setFiltroDoenca('todas'); }} style={{ width: '100%', textAlign: 'left', color: filtroEsp === e.id ? C.accent : C.text, fontWeight: 700, display: 'flex', justifyContent: 'space-between' }}><span>{e.nome}</span><span>{e.qtd}</span></button>
              {filtroEsp === e.id && <div style={{ marginTop: 8, display: 'flex', flexDirection: 'column', gap: 5 }}>
                <button onClick={() => abrirNovaPrescricao(e.id, '')} style={{ textAlign: 'left', color: C.accent, fontSize: 12, fontWeight: 700 }}>+ Medicamentos mais utilizados</button>
                <button onClick={() => { const nome = prompt('Nome da doença/condição:'); if (nome) abrirNovaPrescricao(e.id, nome); }} style={{ textAlign: 'left', color: C.accent, fontSize: 12, fontWeight: 700 }}>+ Adicionar doença</button>
                {doencasPorEspecialidade(e.id).map(d => <button key={d} onClick={() => setFiltroDoenca(d)} style={{ textAlign: 'left', color: filtroDoenca === d ? C.accent : C.textMuted, fontSize: 12, padding: '4px 0' }}>• {d}</button>)}
              </div>}
            </div>)}
          </div>}
        </Card>
      </aside>
    </div>
  </div>;
}

const pillStyle = (C, active) => ({
  padding: '6px 12px', borderRadius: 18, fontSize: 12.5, fontWeight: 600,
  background: active ? C.accent : 'transparent', color: active ? '#fff' : C.textMuted,
  border: `1.5px solid ${active ? C.accent : C.border}`
});

function MedCard({ m, C, onEdit, onDelete }) {
  const [aberto, setAberto] = useState(false);
  return (
    <Card C={C} style={{ padding: 0, overflow: 'hidden' }}>
      <button onClick={() => setAberto(!aberto)} style={{
        width: '100%', padding: 16, textAlign: 'left',
        display: 'flex', alignItems: 'center', gap: 14, color: C.text
      }}>
        <span style={{ color: C.accent }}><I.Pill size={18} /></span>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 15, fontWeight: 600, color: C.text }}>{m.nome}</div>
          <div style={{ fontSize: 12, color: C.textMuted, marginTop: 2 }}>
            {[m.classe, m.doenca ? m.categoria : '', m.doenca].filter(Boolean).join(' • ')}
          </div>
        </div>
        {aberto ? <I.ChevU size={16} /> : <I.ChevD size={16} />}
      </button>
      {aberto && (
        <div style={{ padding: '0 16px 16px', borderTop: `1px solid ${C.borderSoft}`, paddingTop: 14 }}>
          <DetailRow label="Especialidade" value={(ESPECIALIDADES.find(t => t.id === (m.especialidade || m.tema)) || {}).nome} C={C} />
          <DetailRow label="Grupo" value={m.doenca || 'Medicamentos mais utilizados'} C={C} />
          <DetailRow label="Prescrição favorita" value={m.prescricao} C={C} highlight />
          <DetailRow label="Indicação" value={m.indicacao} C={C} />
          <DetailRow label="Dose" value={m.dose} C={C} />
          <DetailRow label="Diluição" value={m.diluicao} C={C} />
          <DetailRow label="Velocidade" value={m.velocidade} C={C} />
          <DetailRow label="Dose máxima" value={m.doseMax} C={C} />
          <DetailRow label="Ajuste renal" value={m.ajusteRenal} C={C} />
          <DetailRow label="Cuidados" value={m.cuidados} C={C} highlight />
          <DetailRow label="Observações" value={m.obs} C={C} />
          <div style={{ display: 'flex', gap: 8, marginTop: 12 }}>
            <Button C={C} variant="secondary" size="sm" icon={I.Edit} onClick={onEdit}>Editar</Button>
            <Button C={C} variant="ghost" size="sm" icon={I.Trash} onClick={onDelete}>Deletar</Button>
          </div>
        </div>
      )}
    </Card>
  );
}

const DetailRow = ({ label, value, C, highlight }) => {
  if (!value) return null;
  return (
    <div style={{ marginBottom: 10 }}>
      <div style={{ fontSize: 10.5, color: C.textSoft, fontWeight: 700,
        letterSpacing: '0.06em', textTransform: 'uppercase', marginBottom: 3 }}>{label}</div>
      <div style={{
        fontSize: 13.5, color: highlight ? C.error : C.text, lineHeight: 1.5,
        background: highlight ? C.error + '15' : 'transparent',
        padding: highlight ? '6px 10px' : 0, borderRadius: 6,
        borderLeft: highlight ? `3px solid ${C.error}` : 'none'
      }}>{value}</div>
    </div>
  );
};

// ============= FLUXOGRAMAS =============
function Fluxogramas({ fluxogramas, setFluxogramas, C }) {
  const [showForm, setShowForm] = useState(false);
  const [editing, setEditing] = useState(null);
  const [filtroTema, setFiltroTema] = useState('todos');
  const [form, setForm] = useState({ titulo: '', tema: 'cardio', texto: '', imagem: '', tags: [] });
  const filtrados = fluxogramas.filter(f => filtroTema === 'todos' || f.tema === filtroTema);
  const salvar = () => {
    if (!form.titulo.trim()) return;
    if (editing) setFluxogramas(fluxogramas.map(f => f.id === editing ? { ...form, id: editing } : f));
    else setFluxogramas([{ ...form, id: 'fl-' + Date.now(), criadoEm: new Date().toISOString() }, ...fluxogramas]);
    setShowForm(false); setEditing(null); setForm({ titulo: '', tema: 'cardio', texto: '', imagem: '', tags: [] });
  };
  const handleImage = (e) => { const file = e.target.files?.[0]; if (!file) return; if (file.size > 2 * 1024 * 1024) { alert('Imagem muito grande (máx 2MB).'); return; } const reader = new FileReader(); reader.onload = () => setForm({...form, imagem: reader.result}); reader.readAsDataURL(file); };
  return <div className="lumen-fade-in">
    <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 12, alignItems: 'center', flexWrap: 'wrap', gap: 10 }}><p style={{ color: C.textMuted, fontSize: 14, margin: 0 }}>Seus próprios fluxogramas e algoritmos médicos.</p><Button C={C} icon={I.Plus} onClick={() => { setShowForm(true); setEditing(null); }}>Novo fluxograma</Button></div>
    <div style={{ display: 'flex', gap: 8, marginBottom: 18, flexWrap: 'wrap' }}><select value={filtroTema} onChange={e => setFiltroTema(e.target.value)} style={{ ...inputStyle(C), maxWidth: 260, padding: '8px 12px' }}><option value="todos">Todas as especialidades</option>{ESPECIALIDADES.map(t => <option key={t.id} value={t.id}>{t.nome}</option>)}</select></div>
    {showForm && <Card C={C} style={{ marginBottom: 16 }}><h3 className="lumen-serif" style={{ fontSize: 18, margin: '0 0 14px' }}>{editing ? 'Editar' : 'Novo'} fluxograma</h3><FormInput C={C} label="Título" value={form.titulo} onChange={v => setForm({...form, titulo: v})} /><div style={{ marginTop: 12 }}><FormLabel C={C}>Especialidade</FormLabel><select value={form.tema} onChange={e => setForm({...form, tema: e.target.value})} style={inputStyle(C)}>{ESPECIALIDADES.map(t => <option key={t.id} value={t.id}>{t.nome}</option>)}</select></div><FormLabel C={C} style={{ marginTop: 12 }}>Imagem (opcional)</FormLabel><input type="file" accept="image/*" onChange={handleImage} style={{ fontSize: 13, color: C.textMuted }} />{form.imagem && <img src={form.imagem} alt="" style={{ maxWidth: '100%', maxHeight: 200, marginTop: 8, borderRadius: 8 }} />}<FormLabel C={C} style={{ marginTop: 12 }}>Texto explicativo</FormLabel><textarea value={form.texto} onChange={e => setForm({...form, texto: e.target.value})} style={{ ...inputStyle(C), minHeight: 120 }} /><div style={{ display: 'flex', gap: 8, marginTop: 14 }}><Button C={C} icon={I.Save} onClick={salvar}>Salvar</Button><Button C={C} variant="ghost" onClick={() => { setShowForm(false); setEditing(null); }}>Cancelar</Button></div></Card>}
    {filtrados.length === 0 && !showForm ? <Card C={C} style={{ textAlign: 'center', padding: 60 }}><I.GitBranch size={32} /><div style={{ fontSize: 15, color: C.textMuted, marginTop: 12 }}>Nenhum fluxograma com esse filtro.</div></Card> : <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))', gap: 14 }}>{filtrados.map(f => { const tema = ESPECIALIDADES.find(t => t.id === f.tema); return <Card key={f.id} C={C} hover style={{ padding: 0, overflow: 'hidden' }}>{f.imagem && <div style={{ height: 160, background: C.bg, overflow: 'hidden' }}><img src={f.imagem} alt="" style={{ width: '100%', height: '100%', objectFit: 'cover' }} /></div>}<div style={{ padding: 14 }}>{tema && <Badge C={C}>{tema.nome}</Badge>}<h4 className="lumen-serif" style={{ fontSize: 16, margin: '8px 0 6px', color: C.text }}>{f.titulo}</h4>{f.texto && <div style={{ fontSize: 13, color: C.textMuted, lineHeight: 1.5, display: '-webkit-box', WebkitLineClamp: 3, WebkitBoxOrient: 'vertical', overflow: 'hidden' }}>{f.texto}</div>}<div style={{ display: 'flex', gap: 6, marginTop: 12, justifyContent: 'flex-end' }}><button onClick={() => { setForm(f); setEditing(f.id); setShowForm(true); }} style={{ padding: 4, color: C.textSoft, display: 'flex' }}><I.Edit size={13} /></button><button onClick={() => { if (confirm('Deletar?')) setFluxogramas(fluxogramas.filter(x => x.id !== f.id)); }} style={{ padding: 4, color: C.textSoft, display: 'flex' }}><I.Trash size={13} /></button></div></div></Card>; })}</div>}
  </div>;
}

// ============= RENDER =============
// ============= RENDER =============
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
