  },
  set(key, value) {
    try { localStorage.setItem(key, JSON.stringify(value)); return true; }
    catch { return false; }

};

function salvarEspecialidadeGlobal(nome) {
  const nomeLimpo = String(nome || '').trim();
  if (!nomeLimpo) return;
  const id = slugify(nomeLimpo);
  const extras = storage.get('lumen_temas_extras', []);
  const existe = [...TEMAS_BASE, ...extras].some(t => t.id === id || String(t.nome).toLowerCase() === nomeLimpo.toLowerCase());
  if (!existe) storage.set('lumen_temas_extras', [...extras, { id, nome: nomeLimpo, icon: I.Plus, cor: '#7a7268' }]);
  location.reload();
}
function salvarAnoGlobal(ano) {
  const n = Number(ano);
  if (!n || n < 1900 || n > 2100) return;
  const extras = storage.get('lumen_anos_extras', []);
  storage.set('lumen_anos_extras', [...new Set([...extras.map(Number), n])]);
  location.reload();
}

  useEffect(() => { storage.set('lumen_calculadoras_escores', calculadoras); }, [calculadoras]);
  useEffect(() => { storage.set('lumen_antimicrobianos', antimicrobianos); }, [antimicrobianos]);
  useEffect(() => { storage.set('lumen_medicamentos', medicamentos); }, [medicamentos]);
  useEffect(() => { storage.set('lumen_fluxogramas', fluxogramas); }, [fluxogramas]);
  useEffect(() => { storage.set('lumen_cronograma', cronograma); }, [cronograma]);
  useEffect(() => { storage.set('lumen_instituicoes', instituicoes); }, [instituicoes]);
  useEffect(() => {
    storage.set('lumen_theme', theme);
    document.body.style.background = theme === 'dark' ? '#1a1814' : '#f4ede0';
    document.querySelector('meta[name="theme-color"]')?.setAttribute('content', theme === 'dark' ? '#1a1814' : '#f4ede0');
  }, [theme]);

  useEffect(() => {
    const loader = document.getElementById('initial-loader');
    if (loader) setTimeout(() => loader.style.display = 'none', 200);
  }, []);

  const isDark = theme === 'dark';
  const C = isDark ? {
    bg: '#1a1814', card: '#252119', cardElev: '#2d2820', border: '#3d3528',
    borderSoft: '#332c22', text: '#f0e8d4', textMuted: '#b5a78b', textSoft: '#8a7d65',
    accent: '#7da876', accentDeep: '#a8c89e', accentSoft: '#2d3a2d',
    highlight: '#3d3528', success: '#7da876', error: '#d97a72', warn: '#d4a04a'
  } : {
    bg: '#f4ede0', card: '#fbf6ea', cardElev: '#ffffff', border: '#d6c8a8',
    borderSoft: '#e3d8b8', text: '#2a2620', textMuted: '#6b5d4a', textSoft: '#8a7d65',
    accent: '#2c5e3f', accentDeep: '#1f4530', accentSoft: '#dde6d4',
    highlight: '#ebe1c8', success: '#2c5e3f', error: '#b85450', warn: '#c47d3d'
  };

  const sharedProps = {
    questoes, setQuestoes, flashcards, setFlashcards, artigos, setArtigos,
    calculadoras, setCalculadoras, antimicrobianos, setAntimicrobianos,
    medicamentos, setMedicamentos, fluxogramas, setFluxogramas,
    cronograma, setCronograma, instituicoes, setInstituicoes,
    setPage, C, isDark
  };

  return (
    <div style={{
      minHeight: '100vh', minHeight: '100dvh', background: C.bg, color: C.text, display: 'flex',
      transition: 'background 0.3s, color 0.3s'
    }}>
      <Sidebar
        page={page} setPage={setPage} C={C}
        theme={theme} setTheme={setTheme}
        mobileMenuOpen={mobileMenuOpen} setMobileMenuOpen={setMobileMenuOpen}
      />
      <main className="lumen-main" style={{
        flex: 1, minHeight: '100vh', minHeight: '100dvh', minWidth: 0,
        display: 'flex', flexDirection: 'column'
      }}>
        <TopBar
          C={C} isDark={isDark} theme={theme} setTheme={setTheme}
          mobileMenuOpen={mobileMenuOpen} setMobileMenuOpen={setMobileMenuOpen}

        />
        <div style={{ padding: '24px clamp(16px, 4vw, 48px) 80px', maxWidth: 1400, margin: '0 auto', width: '100%', flex: 1 }}>
          {page === 'dashboard' && <Dashboard {...sharedProps} />}
          {page === 'questoes' && <Questoes {...sharedProps} />}
          {page === 'simulado' && <Simulado {...sharedProps} />}
          {page === 'flashcards' && <Flashcards {...sharedProps} />}
          {page === 'cronograma' && <Cronograma {...sharedProps} />}
          {page === 'calculadoras' && <CalculadorasEscores {...sharedProps} />}
          {page === 'artigos' && <Artigos {...sharedProps} />}
          {page === 'antimicrobianos' && <GuiaAntimicrobianos {...sharedProps} />}
          {page === 'medicamentos' && <Medicamentos {...sharedProps} />}
          {page === 'fluxogramas' && <Fluxogramas {...sharedProps} />}
        </div>
      </main>
      <style>{`
        @media (min-width: 900px) {
          .lumen-sidebar { transform: translateX(0) !important; }
          .lumen-main { margin-left: 240px; }
          .lumen-mobile-menu { display: none !important; }
          .lumen-overlay { display: none !important; }
        }
        @media (max-width: 899px) {
          .lumen-mobile-menu { display: inline-flex !important; }
          .lumen-grid-resp { grid-template-columns: 1fr !important; }
          .lumen-search-text { display: none !important; }
        }
      `}</style>
    </div>
  );
}

// ============= TOPBAR =============
function TopBar({ C, theme, setTheme, mobileMenuOpen, setMobileMenuOpen, page, questoes, flashcards, artigos, calculadoras, antimicrobianos, medicamentos, setPage }) {
  const [searchOpen, setSearchOpen] = useState(false);
  const [query, setQuery] = useState('');
  const titles = {
    dashboard: 'Painel', questoes: 'Banco de Questões', simulado: 'Simulado',
    flashcards: 'Flashcards', cronograma: 'Cronograma Semanal',
    calculadoras: 'Calculadoras & Escores',
    artigos: 'Biblioteca', antimicrobianos: 'Guia de Antimicrobianos', medicamentos: 'Medicamentos & Prescrições',
    fluxogramas: 'Fluxogramas Pessoais',
  };

  const results = useMemo(() => {
    if (!query.trim()) return [];
    const q = query.toLowerCase();
    const r = [];
    questoes.forEach(item => {
      if ((item.enunciado || '').toLowerCase().includes(q) || (item.subtema || '').toLowerCase().includes(q))
        r.push({ tipo: 'Questão', label: `Q${item.numero} • ${item.subtema}`, action: () => setPage('questoes') });
    });
    flashcards.forEach(item => {
      if ((item.frente || '').toLowerCase().includes(q) || (item.verso || '').toLowerCase().includes(q))
        r.push({ tipo: 'Flashcard', label: item.frente, action: () => setPage('flashcards') });
    });
    medicamentos.forEach(item => {
      if ((item.nome || '').toLowerCase().includes(q))
        r.push({ tipo: 'Medicamento', label: item.nome, action: () => setPage('medicamentos') });
    });
    (calculadoras || []).forEach(item => {
      if ((item.nome || '').toLowerCase().includes(q) || (item.escore || '').toLowerCase().includes(q))
        r.push({ tipo: 'Calculadora', label: item.nome || item.escore, action: () => setPage('calculadoras') });
    });
    (antimicrobianos || []).forEach(item => {
      if ((item.agente || '').toLowerCase().includes(q) || (item.classe || '').toLowerCase().includes(q) || (item.antibiotico || '').toLowerCase().includes(q))
        r.push({ tipo: 'Antimicrobiano', label: item.antibiotico || item.agente || item.classe, action: () => setPage('antimicrobianos') });
    });
    artigos.forEach(item => {
      if ((item.titulo || '').toLowerCase().includes(q))
        r.push({ tipo: 'Artigo', label: item.titulo, action: () => setPage('artigos') });
    });
    return r.slice(0, 8);
  }, [query, questoes, flashcards, medicamentos, artigos, calculadoras, antimicrobianos]);

  return (
    <header style={{
      height: 64, borderBottom: `1px solid ${C.borderSoft}`, background: C.bg,
      display: 'flex', alignItems: 'center', padding: '0 clamp(16px, 4vw, 32px)',
      gap: 12, position: 'sticky', top: 0, zIndex: 30
    }}>
      <button className="lumen-mobile-menu" onClick={() => setMobileMenuOpen(!mobileMenuOpen)} style={{
        padding: 8, borderRadius: 6, color: C.text, display: 'none', alignItems: 'center'
      }}>
        <I.Menu size={22} />
      </button>

      <h1 className="lumen-serif" style={{
        fontSize: 'clamp(18px, 3vw, 22px)', fontWeight: 500, margin: 0, color: C.text, letterSpacing: '-0.01em'
      }}>{titles[page]}</h1>

      <div style={{ flex: 1 }} />

      <div style={{ position: 'relative' }}>
        <button onClick={() => setSearchOpen(!searchOpen)} style={{
          padding: '8px 12px', borderRadius: 8, color: C.textMuted,
          display: 'flex', alignItems: 'center', gap: 8, background: C.card,
          border: `1px solid ${C.borderSoft}`, fontSize: 13
        }}>
          <I.Search size={15} />
          <span className="lumen-search-text">Buscar...</span>
        </button>
        {searchOpen && (
          <div style={{
            position: 'absolute', top: 'calc(100% + 6px)', right: 0,
            width: 'min(380px, 90vw)', background: C.cardElev,
            border: `1px solid ${C.border}`, borderRadius: 10,
            boxShadow: `0 12px 32px rgba(0,0,0,0.12)`, padding: 12, zIndex: 100
          }}>
            <input autoFocus value={query} onChange={e => setQuery(e.target.value)}
              placeholder="Buscar em todo o sistema..."
              style={{
                width: '100%', padding: '10px 12px', borderRadius: 6,
                border: `1px solid ${C.border}`, background: C.bg, color: C.text,
                fontSize: 14
              }} />
            <div style={{ marginTop: 8, maxHeight: 320, overflowY: 'auto' }} className="lumen-scroll">
              {query && results.length === 0 && (
                <div style={{ padding: 16, color: C.textSoft, fontSize: 13, textAlign: 'center' }}>
                  Nenhum resultado.
                </div>
              )}
              {results.map((r, i) => (
                <button key={i} onClick={() => { r.action(); setSearchOpen(false); setQuery(''); }}
                  style={{
                    width: '100%', padding: '10px 12px', textAlign: 'left',
                    borderRadius: 6, marginBottom: 2, color: C.text, fontSize: 13,
                    display: 'flex', flexDirection: 'column', gap: 2,
                  }}
                  onMouseEnter={e => e.currentTarget.style.background = C.borderSoft}
                  onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
                  <span style={{ fontSize: 10, color: C.accent, textTransform: 'uppercase', letterSpacing: '0.05em', fontWeight: 600 }}>
                    {r.tipo}
                  </span>
                  <span style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                    {r.label}
                  </span>
                </button>
              ))}
            </div>
          </div>
        )}
      </div>

      <button onClick={() => setTheme(theme === 'light' ? 'dark' : 'light')} style={{
        padding: 9, borderRadius: 8, color: C.textMuted, background: C.card,
        border: `1px solid ${C.borderSoft}`, display: 'flex', alignItems: 'center'
      }}>
        {theme === 'light' ? <I.Moon size={16} /> : <I.Sun size={16} />}
      </button>
    </header>
  );
}

// ============= UI HELPERS =============
const Card = ({ children, C, style = {}, onClick, hover = false, ...rest }) => (
  <div onClick={onClick} {...rest} style={{
    background: C.card, border: `1px solid ${C.borderSoft}`, borderRadius: 12,
    padding: 20, transition: 'all 0.2s', cursor: onClick ? 'pointer' : 'default',
    ...style
  }}
  onMouseEnter={e => { if (hover) { e.currentTarget.style.transform = 'translateY(-2px)'; e.currentTarget.style.boxShadow = `0 8px 20px rgba(0,0,0,0.08)`; }}}
  onMouseLeave={e => { if (hover) { e.currentTarget.style.transform = 'translateY(0)'; e.currentTarget.style.boxShadow = 'none'; }}}>
    {children}
  </div>
);

const Button = ({ children, C, variant = 'primary', size = 'md', icon: IconC, ...props }) => {
  const sizes = { sm: '7px 12px', md: '10px 16px', lg: '12px 20px' };
  const styles = {
    primary: { background: C.accent, color: '#fff', border: `1px solid ${C.accent}` },
    secondary: { background: C.card, color: C.text, border: `1px solid ${C.border}` },
    ghost: { background: 'transparent', color: C.textMuted, border: 'none' },
    danger: { background: 'transparent', color: C.error, border: `1px solid ${C.error}30` },
    success: { background: C.success, color: '#fff', border: `1px solid ${C.success}` },
  };
  const { style, ...rest } = props;
  return (
    <button {...rest} style={{
      padding: sizes[size], borderRadius: 8, fontSize: size === 'sm' ? 12.5 : 13.5, fontWeight: 600,
      display: 'inline-flex', alignItems: 'center', gap: 7, transition: 'all 0.15s',
      ...styles[variant], ...style
    }}
    onMouseEnter={e => { e.currentTarget.style.opacity = '0.88'; }}
    onMouseLeave={e => { e.currentTarget.style.opacity = '1'; }}>
      {IconC && <IconC size={size === 'sm' ? 13 : 15} />}
      {children}
    </button>
  );
};

const Badge = ({ children, C, color = 'accent' }) => {
  const colors = {
    accent: { bg: C.accentSoft, fg: C.accent },
    warn: { bg: C.warn + '20', fg: C.warn },
    error: { bg: C.error + '20', fg: C.error },
    soft: { bg: C.borderSoft, fg: C.textMuted },
  };
  const c = colors[color] || colors.accent;
  return (
    <span style={{
      padding: '3px 9px', borderRadius: 6, background: c.bg, color: c.fg,
      fontSize: 11, fontWeight: 600, letterSpacing: '0.02em',
      display: 'inline-flex', alignItems: 'center', gap: 4
    }}>{children}</span>
  );
};

// ============= DASHBOARD =============
function Dashboard({ questoes, flashcards, cronograma, setCronograma, setPage, C }) {
  const respondidas = questoes.filter(q => q.resposta);
  const acertos = respondidas.filter(q => q.acertou).length;
  const taxa = respondidas.length ? Math.round((acertos / respondidas.length) * 100) : 0;

  const erradasPorSubtema = useMemo(() => {
    const m = {};
    questoes.filter(q => q.resposta && !q.acertou).forEach(q => {
      const s = q.subtema || 'Sem subtema';
      m[s] = m[s] || [];
      m[s].push(q);
    });
    return Object.entries(m).sort((a, b) => b[1].length - a[1].length);
  }, [questoes]);

  const desempenhoPorTema = useMemo(() => {
    const m = {};
    respondidas.forEach(q => {
      const t = TEMAS.find(t => t.id === q.tema);
      const nome = t?.nome || 'Outros';
      m[nome] = m[nome] || { total: 0, acertos: 0, cor: t?.cor || '#888' };
      m[nome].total++;
      if (q.acertou) m[nome].acertos++;
    });
    return Object.entries(m).map(([nome, d]) => ({ nome, ...d, taxa: Math.round((d.acertos / d.total) * 100) }));
  }, [respondidas]);

  const semanaAtual = cronograma?.semanas?.[0];
  const atualizarTemaSemana = (idxDia, idxTema, concluido) => {
    if (!semanaAtual || !setCronograma) return;
    setCronograma({
      semanas: (cronograma.semanas || []).map(s => s.id === semanaAtual.id ? {
        ...s,
        dias: (s.dias || []).map((d, i) => {
          if (i !== idxDia) return d;
          const temasChecklist = normalizarTemasDoDia(d).map((t, j) => j === idxTema ? { ...t, concluido } : t);
          return { ...d, temasChecklist, concluido: temasChecklist.length > 0 && temasChecklist.every(t => t.concluido) };
        })
      } : s)
    });
  };
  const diasComTema = (semanaAtual?.dias || []).filter(d => normalizarTemasDoDia(d).length > 0);
  const resumoTemasSemana = resumoConclusaoTemas(semanaAtual?.dias || []);

  return (
    <div className="lumen-fade-in">
      <div style={{
        marginBottom: 32, display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between',
        flexWrap: 'wrap', gap: 16
      }}>
        <div>
          <div style={{ fontSize: 12, color: C.textSoft, letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 6 }}>
            Bem-vinda de volta
          </div>
          <h2 className="lumen-serif" style={{
            fontSize: 'clamp(26px, 4vw, 38px)', fontWeight: 500, margin: 0, color: C.text,
            letterSpacing: '-0.02em', lineHeight: 1.15
          }}>
            Sua jornada na <em style={{ color: C.accent, fontStyle: 'italic' }}>residência</em>,<br />
            organizada com clareza.
          </h2>
        </div>
        <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
          <Button C={C} icon={I.Plus} onClick={() => setPage('questoes')}>Nova questão</Button>
          <Button C={C} variant="secondary" icon={I.Layers} onClick={() => setPage('flashcards')}>Flashcards</Button>
        </div>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(220px, 1fr))', gap: 16, marginBottom: 24 }}>
        <StatCard C={C} label="Questões resolvidas" value={respondidas.length} sub={`${questoes.length} cadastradas`} icon={I.Book} />
        <StatCard C={C} label="Taxa de acerto" value={`${taxa}%`} sub={`${acertos} acertos`} icon={I.Target} accent />
        <StatCard C={C} label="Flashcards" value={flashcards.length} sub={`${flashcards.filter(f => f.revisarHoje).length} para revisar`} icon={I.Layers} />
        <StatCard C={C} label="Para revisar" value={questoes.filter(q => q.revisarDepois).length} sub="questões marcadas" icon={I.Bookmark} />
      </div>

      <div className="lumen-grid-resp" style={{ display: 'grid', gridTemplateColumns: 'minmax(0, 2fr) minmax(0, 1fr)', gap: 20, marginBottom: 24 }}>
        <Card C={C}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 18 }}>
            <h3 className="lumen-serif" style={{ fontSize: 18, fontWeight: 500, margin: 0, color: C.text }}>
              Desempenho por tema
            </h3>
            <I.Trend size={16} />
          </div>
          {desempenhoPorTema.length === 0 ? (
            <div style={{ padding: '32px 0', textAlign: 'center', color: C.textSoft, fontSize: 13 }}>
              Resolva questões para ver o desempenho por tema.
            </div>
          ) : (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
              {desempenhoPorTema.map(t => (
                <div key={t.nome}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6, fontSize: 13 }}>
                    <span style={{ color: C.text, fontWeight: 500 }}>{t.nome}</span>
                    <span style={{ color: C.textMuted }}>
                      {t.acertos}/{t.total} • <strong style={{ color: t.taxa >= 70 ? C.success : t.taxa >= 50 ? C.warn : C.error }}>{t.taxa}%</strong>
                    </span>
                  </div>
                  <div style={{ height: 6, background: C.borderSoft, borderRadius: 3, overflow: 'hidden' }}>
                    <div style={{ height: '100%', width: `${t.taxa}%`, background: t.cor, transition: 'width 0.6s' }} />
                  </div>
                </div>
              ))}
            </div>
          )}
        </Card>

        <Card C={C}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 14 }}>
            <h3 className="lumen-serif" style={{ fontSize: 18, fontWeight: 500, margin: 0, color: C.text }}>
              Minha semana
            </h3>
            <button onClick={() => setPage('cronograma')} style={{ color: C.accent, fontSize: 12, fontWeight: 600 }}>
              Abrir →
            </button>
          </div>
          {semanaAtual ? (
            <>
              <div style={{ fontSize: 12, color: C.textMuted, marginBottom: 10 }}>
                {semanaAtual.inicio} → {semanaAtual.fim}
              </div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                <ProgressItem C={C} label="Questões"
                  atual={respondidas.filter(q => isThisWeek(q.dataResposta)).length}
                  meta={semanaAtual.metaQuestoes || 50} />
                <ProgressItem C={C} label="Flashcards"
                  atual={flashcards.filter(f => isThisWeek(f.dataCriacao)).length}
                  meta={semanaAtual.metaFlashcards || 20} />
              </div>
              <div style={{ marginTop: 18, paddingTop: 14, borderTop: `1px solid ${C.borderSoft}` }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
                  <div style={{ fontSize: 12, color: C.textSoft, fontWeight: 700, letterSpacing: '0.05em', textTransform: 'uppercase' }}>Temas da semana</div>
                  <div style={{ fontSize: 12, color: C.textMuted }}>{resumoTemasSemana.concluidos}/{resumoTemasSemana.total || 0}</div>
                </div>
                {diasComTema.length === 0 ? (
                  <div style={{ fontSize: 12, color: C.textSoft }}>Adicione temas no cronograma para eles aparecerem aqui.</div>
                ) : (
                  <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>

function normalizarTemasDoDia(dia) {
  const linhas = String(dia?.temas || '')
    .split(/\n|;/)
    .map(t => t.trim())
    .filter(Boolean);
  const antigos = Array.isArray(dia?.temasChecklist) ? dia.temasChecklist : [];
  return linhas.map((titulo, idx) => {
    const antigo = antigos.find(t => t.titulo === titulo) || antigos[idx];
    return { id: antigo?.id || ('tema-' + idx + '-' + titulo.slice(0, 18)), titulo, concluido: !!antigo?.concluido };
  });
}

function resumoConclusaoTemas(dias = []) {
  const todos = dias.flatMap(d => normalizarTemasDoDia(d));
  return { total: todos.length, concluidos: todos.filter(t => t.concluido).length };
}

function isThisWeek(dateStr) {
  if (!dateStr) return false;
  const d = new Date(dateStr);
  const now = new Date();
  const diff = (now - d) / (1000 * 60 * 60 * 24);
  return diff < 7;
}

// ============= QUESTÕES =============
function Questoes({ questoes, setQuestoes, flashcards, setFlashcards, instituicoes, setInstituicoes, C, isDark }) {
  const [view, setView] = useState('lista');
  const [selectedId, setSelectedId] = useState(null);
  const [filtros, setFiltros] = useState({ tema: 'todos', instituicao: 'todas', ano: 'todos', status: 'todos' });
  const [showFiltros, setShowFiltros] = useState(false);

  useEffect(() => {
    const alvo = storage.get('lumen_open_question', null);
    if (alvo && questoes.some(q => q.id === alvo)) {
      setSelectedId(alvo);
      setView('resolver');
      localStorage.removeItem('lumen_open_question');
    }
  }, [questoes]);

  const filtradas = useMemo(() => {
    return questoes.filter(q => {
      if (filtros.tema !== 'todos' && q.tema !== filtros.tema) return false;
      if (filtros.instituicao !== 'todas' && q.instituicao !== filtros.instituicao) return false;
      if (filtros.ano !== 'todos' && String(q.ano) !== filtros.ano) return false;
      if (filtros.status === 'erradas' && (q.acertou !== false)) return false;
      if (filtros.status === 'acertadas' && (q.acertou !== true)) return false;
      if (filtros.status === 'naoFeitas' && q.resposta) return false;
      if (filtros.status === 'revisar' && !q.revisarDepois) return false;
      if (filtros.status === 'favoritas' && !q.favorita) return false;
      return true;
    });
  }, [questoes, filtros]);

  const anos = ANOS_QUESTOES;

  const excluirQuestao = (id) => {
    const alvo = questoes.find(q => q.id === id);
    if (!alvo) return;
    const identificacao = `#${alvo.numero || ''} ${alvo.instituicao || ''} ${alvo.ano || ''}`.trim();
    if (!confirm(`Tem certeza que deseja excluir a questão ${identificacao}?\n\nEssa ação não pode ser desfeita.`)) return;
    setQuestoes(questoes.filter(q => q.id !== id));
    if (selectedId === id) {
      setSelectedId(null);
      setView('lista');
    }
  };

  if (view === 'resolver' && selectedId) {
    return <ResolverQuestao C={C} isDark={isDark}
      questao={questoes.find(q => q.id === selectedId)}
      lista={filtradas.some(q => q.id === selectedId) ? filtradas : questoes}
      onUpdate={(updated) => setQuestoes(questoes.map(q => q.id === updated.id ? updated : q))}
      onEdit={() => setView('editar')}
      onDelete={() => excluirQuestao(selectedId)}
      onClose={() => setView('lista')}
      onNavigate={(id) => setSelectedId(id)}
      flashcards={flashcards} setFlashcards={setFlashcards} />;
  }

  if (view === 'editar' && selectedId) {
    const questaoAtual = questoes.find(q => q.id === selectedId);
    if (!questaoAtual) {
      setView('lista');
      setSelectedId(null);
      return null;
    }
    return <CriarQuestao C={C} instituicoes={instituicoes} setInstituicoes={setInstituicoes}
      questaoInicial={questaoAtual}
      modoEdicao={true}
      onSave={(editada) => { setQuestoes(questoes.map(q => q.id === editada.id ? editada : q)); setView('resolver'); }}
      onCancel={() => setView('resolver')} />;
  }

  if (view === 'criar') {
    return <CriarQuestao C={C} instituicoes={instituicoes} setInstituicoes={setInstituicoes}
      onSave={(nova) => { setQuestoes([nova, ...questoes]); setView('lista'); }}
      onCancel={() => setView('lista')} />;
  }

  return (
    <div className="lumen-fade-in">
      <div style={{ display: 'flex', gap: 10, marginBottom: 18, flexWrap: 'wrap' }}>
        <Button C={C} icon={I.Plus} onClick={() => setView('criar')}>Cadastrar questão</Button>
        <Button C={C} variant="secondary" icon={I.Upload} onClick={() => alert('Importação de PDF: para extração automática, é necessário hospedar com backend e API. Por enquanto, use o cadastro manual.')}>
          Importar PDF
        </Button>
        <Button C={C} variant="secondary" icon={I.Filter} onClick={() => setShowFiltros(!showFiltros)}>
          Filtros
        </Button>
        <div style={{ flex: 1 }} />
        <span style={{ fontSize: 13, color: C.textMuted, alignSelf: 'center' }}>
          {filtradas.length} de {questoes.length}
        </span>
      </div>

      <GerenciarListasRapidas C={C} instituicoes={instituicoes} setInstituicoes={setInstituicoes} />

      {showFiltros && (
        <Card C={C} style={{ marginBottom: 16 }}>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(160px, 1fr))', gap: 12 }}>
            <FilterSelect C={C} label="Tema" value={filtros.tema} onChange={v => setFiltros({...filtros, tema: v})}
              options={[['todos', 'Todos'], ...TEMAS.map(t => [t.id, t.nome])]} />
            <FilterSelect C={C} label="Instituição" value={filtros.instituicao} onChange={v => setFiltros({...filtros, instituicao: v})}
              options={[['todas', 'Todas'], ...instituicoes.map(i => [i, i])]} />
            <FilterSelect C={C} label="Ano" value={filtros.ano} onChange={v => setFiltros({...filtros, ano: v})}
              options={[['todos', 'Todos'], ...anos.map(a => [String(a), String(a)])]} />
            <FilterSelect C={C} label="Status" value={filtros.status} onChange={v => setFiltros({...filtros, status: v})}
              options={[['todos', 'Todos'], ['naoFeitas', 'Não feitas'], ['acertadas', 'Acertadas'], ['erradas', 'Erradas'], ['revisar', 'Revisar depois'], ['favoritas', 'Favoritas']]} />
          </div>
        </Card>
      )}

      {filtradas.length === 0 ? (
        <Card C={C} style={{ textAlign: 'center', padding: 60 }}>
          <I.Book size={32} />
          <div style={{ fontSize: 15, color: C.textMuted, marginBottom: 4, marginTop: 12 }}>Nenhuma questão encontrada.</div>
          <div style={{ fontSize: 13, color: C.textSoft }}>Cadastre uma nova ou ajuste os filtros.</div>
        </Card>
      ) : (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
          {filtradas.map(q => {
            const tema = TEMAS.find(t => t.id === q.tema);
            return (
              <Card key={q.id} C={C} hover onClick={() => { setSelectedId(q.id); setView('resolver'); }}
                style={{ padding: 16 }}>
                <div style={{ display: 'flex', alignItems: 'flex-start', gap: 14 }}>
                  <div style={{
                    width: 4, alignSelf: 'stretch', borderRadius: 2, background: tema?.cor || C.border, minHeight: 40
                  }} />
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ display: 'flex', gap: 8, marginBottom: 6, flexWrap: 'wrap' }}>
                      <Badge C={C} color="soft">#{q.numero}</Badge>
                      <Badge C={C} color="soft">{q.instituicao} • {q.ano}</Badge>
                      {tema && <Badge C={C}>{tema.nome}</Badge>}
                      {q.favorita && <Badge C={C} color="warn"><I.Star filled size={10} /> Favorita</Badge>}
                      {q.revisarDepois && <Badge C={C} color="warn"><I.Flag size={10} /> Revisar</Badge>}
                      {q.acertou === true && <Badge C={C}>✓ Acertou</Badge>}
                      {q.acertou === false && <Badge C={C} color="error">✕ Errou</Badge>}
                    </div>
                    <div style={{ fontSize: 13.5, color: C.text, lineHeight: 1.55,
                      display: '-webkit-box', WebkitLineClamp: 2, WebkitBoxOrient: 'vertical', overflow: 'hidden'
                    }}>
                      {q.enunciado}
                    </div>
                    <div style={{ fontSize: 12, color: C.textSoft, marginTop: 6 }}>{q.subtema}</div>
                  </div>
                  <div style={{ display: 'flex', gap: 6, alignItems: 'center', flexShrink: 0 }} onClick={e => e.stopPropagation()}>
                    <button title="Editar questão" onClick={() => { setSelectedId(q.id); setView('editar'); }} style={{
                      padding: 8, borderRadius: 6, color: C.textMuted,
                      background: C.bg, border: `1px solid ${C.borderSoft}`, display: 'flex', alignItems: 'center'
                    }}>
                      <I.Edit size={15} />
                    </button>
                    <button title="Excluir questão" onClick={() => excluirQuestao(q.id)} style={{
                      padding: 8, borderRadius: 6, color: C.error,
                      background: C.bg, border: `1px solid ${C.error}30`, display: 'flex', alignItems: 'center'
                    }}>
                      <I.Trash size={15} />
                    </button>
                    <I.ChevR size={18} />
                  </div>
                </div>
              </Card>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ============= RESOLVER QUESTÃO =============
function ResolverQuestao({ C, isDark, questao, lista, onUpdate, onEdit, onDelete, onClose, onNavigate, flashcards, setFlashcards }) {
  const [escolha, setEscolha] = useState(questao.resposta || null);
  const [confirmada, setConfirmada] = useState(!!questao.resposta);
  const [activeTab, setActiveTab] = useState('detalhado');
  const [editandoComentario, setEditandoComentario] = useState(false);
  const [comentarioEdit, setComentarioEdit] = useState(questao.comentarioDetalhado || '');
  const [criandoFlashcard, setCriandoFlashcard] = useState(false);
  const [novoFlash, setNovoFlash] = useState({ frente: '', verso: '' });

  useEffect(() => {
    setEscolha(questao.resposta || null);
    setConfirmada(!!questao.resposta);
    setComentarioEdit(questao.comentarioDetalhado || '');
    setActiveTab('detalhado');
  }, [questao.id]);

  const idx = lista.findIndex(q => q.id === questao.id);
  const tema = TEMAS.find(t => t.id === questao.tema);

  const confirmar = () => {
    if (!escolha) return;
    const acertou = escolha === questao.gabarito;
    onUpdate({ ...questao, resposta: escolha, acertou, dataResposta: new Date().toISOString() });
    setConfirmada(true);
  };

  const setChecklist = (idx, valor) => {
    onUpdate({ ...questao, checklistRespostas: { ...questao.checklistRespostas, [idx]: valor } });
  };

  const toggleFav = () => onUpdate({ ...questao, favorita: !questao.favorita });
  const toggleRevisar = () => onUpdate({ ...questao, revisarDepois: !questao.revisarDepois });

  const flashcardsRelacionados = flashcards.filter(f => f.questaoId === questao.id);

  const criarFlashcard = () => {
    if (!novoFlash.frente.trim()) return;
    setFlashcards([{
      id: 'f-' + Date.now(),
      frente: novoFlash.frente, verso: novoFlash.verso,
      tema: questao.tema, subtema: questao.subtema,
      questaoId: questao.id, tags: questao.tags || [],
      dificuldade: 'media', dataCriacao: new Date().toISOString(),
      proximaRevisao: new Date().toISOString(), intervaloDias: 0,
      revisarHoje: true, historico: []
    }, ...flashcards]);
    setNovoFlash({ frente: '', verso: '' });
    setCriandoFlashcard(false);
  };

  return (
    <div className="lumen-fade-in">
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 18, flexWrap: 'wrap' }}>
        <Button C={C} variant="ghost" size="sm" icon={I.ArrowL} onClick={onClose}>Lista</Button>
        <Button C={C} variant="secondary" size="sm" icon={I.Edit} onClick={onEdit}>Editar questão</Button>
        <Button C={C} variant="danger" size="sm" icon={I.Trash} onClick={onDelete}>Excluir</Button>
        <div style={{ flex: 1 }} />
        <button disabled={idx <= 0} onClick={() => onNavigate(lista[idx - 1].id)} style={{
          padding: 8, borderRadius: 6, color: idx <= 0 ? C.textSoft : C.textMuted,
          background: C.card, border: `1px solid ${C.borderSoft}`, opacity: idx <= 0 ? 0.5 : 1,
          display: 'flex', alignItems: 'center'
        }}>
          <I.ChevL size={16} />
        </button>
        <span style={{ fontSize: 13, color: C.textMuted, fontWeight: 600 }}>
          {idx + 1} de {lista.length}
        </span>
        <button disabled={idx >= lista.length - 1} onClick={() => onNavigate(lista[idx + 1].id)} style={{
          padding: 8, borderRadius: 6, color: idx >= lista.length - 1 ? C.textSoft : C.textMuted,
          background: C.card, border: `1px solid ${C.borderSoft}`, opacity: idx >= lista.length - 1 ? 0.5 : 1,
          display: 'flex', alignItems: 'center'
        }}>
          <I.ChevR size={16} />
        </button>
        <button onClick={toggleFav} style={{
          padding: 8, borderRadius: 6, color: questao.favorita ? C.warn : C.textMuted,
          background: C.card, border: `1px solid ${C.borderSoft}`, display: 'flex', alignItems: 'center'
        }}>
          <I.Star filled={questao.favorita} size={16} />
        </button>
        <button onClick={toggleRevisar} style={{
          padding: 8, borderRadius: 6, color: questao.revisarDepois ? C.warn : C.textMuted,
          background: C.card, border: `1px solid ${C.borderSoft}`, display: 'flex', alignItems: 'center'
        }}>
          <I.Flag filled={questao.revisarDepois} size={16} />
        </button>
      </div>

      <div style={{ display: 'flex', gap: 8, marginBottom: 16, flexWrap: 'wrap' }}>
        <Badge C={C} color="soft">{questao.instituicao} · {questao.ano}</Badge>
        {tema && <Badge C={C}>{tema.nome}</Badge>}
        <Badge C={C} color="soft">{questao.subtema}</Badge>
        {questao.tags?.map(t => <Badge key={t} C={C} color="soft">#{t}</Badge>)}
      </div>

      <Card C={C} style={{ marginBottom: 16, padding: 'clamp(20px, 4vw, 32px)' }}>
        <div className="lumen-serif" style={{
          fontSize: 'clamp(14.5px, 1.5vw, 16px)', lineHeight: 1.75, color: C.text, fontWeight: 400,
        }}>
          {questao.enunciado}
        </div>
      </Card>

      <div style={{ display: 'flex', flexDirection: 'column', gap: 10, marginBottom: 20 }}>
        {(questao.alternativas || []).filter(a => (a.texto || '').trim()).map(alt => {
          const isEscolha = escolha === alt.letra;
          const isCorreta = confirmada && alt.letra === questao.gabarito;
          const isErradaEscolhida = confirmada && isEscolha && alt.letra !== questao.gabarito;
          let bg = C.card, border = C.borderSoft, indicator = null;

          if (confirmada) {
            if (isCorreta) { bg = isDark ? '#2c4a36' : '#e0ebd9'; border = C.success; indicator = <I.Check size={18} />; }
            else if (isErradaEscolhida) { bg = isDark ? '#4a2c2c' : '#f3dcd9'; border = C.error; indicator = <I.X size={18} />; }
          } else if (isEscolha) {
            bg = C.accentSoft; border = C.accent;
          }

          return (
            <button key={alt.letra} disabled={confirmada}
              onClick={() => !confirmada && setEscolha(alt.letra)}
              style={{
                padding: '14px 16px', borderRadius: 10, background: bg,
                border: `1.5px solid ${border}`, textAlign: 'left',
                color: C.text, cursor: confirmada ? 'default' : 'pointer',
                display: 'flex', alignItems: 'center', gap: 14, transition: 'all 0.15s',
                fontSize: 14.5, lineHeight: 1.5
              }}>
              <div style={{
                width: 32, height: 32, borderRadius: '50%',
                background: isCorreta ? C.success : isErradaEscolhida ? C.error : isEscolha ? C.accent : C.borderSoft,
                color: (isCorreta || isErradaEscolhida || isEscolha) ? '#fff' : C.text,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontWeight: 700, fontSize: 14, flexShrink: 0
              }}>{alt.letra}</div>
              <span style={{ flex: 1 }}>{alt.texto}</span>
              <span style={{ color: isCorreta ? C.success : C.error }}>{indicator}</span>
            </button>
          );
        })}
      </div>

      {!confirmada && (
        <Button C={C} disabled={!escolha} onClick={confirmar} size="lg"
          style={{ opacity: escolha ? 1 : 0.5, marginBottom: 20 }}>
          Confirmar resposta
        </Button>
      )}

      {confirmada && (
        <div className="lumen-fade-in">
          <div style={{
            padding: '14px 18px', borderRadius: 10, marginBottom: 16,
            background: questao.acertou ? (isDark ? '#2c4a36' : '#e0ebd9') : (isDark ? '#4a2c2c' : '#f3dcd9'),
            border: `1px solid ${questao.acertou ? C.success : C.error}`,
            display: 'flex', alignItems: 'flex-start', gap: 12
          }}>
            <span style={{ color: questao.acertou ? C.success : C.error }}>
              {questao.acertou ? <I.Check size={20} /> : <I.X size={20} />}
            </span>
            <div>
              <div style={{ fontWeight: 700, color: questao.acertou ? C.success : C.error, marginBottom: 4 }}>
                {questao.acertou ? 'Correto!' : 'Incorreto'}
              </div>
              <div style={{ fontSize: 14, color: C.text, lineHeight: 1.55 }}>
                {questao.comentarioBreve}
              </div>
            </div>
          </div>

          <div style={{
            display: 'flex', gap: 4, marginBottom: 12, overflowX: 'auto',
            borderBottom: `1px solid ${C.borderSoft}`,
          }} className="lumen-scroll">
            {[
              { id: 'detalhado', label: 'Comentário detalhado' },
              { id: 'dica', label: 'Dica de prova' },
              { id: 'checklist', label: 'Checklist essencial' },
              { id: 'alternativas', label: 'Comentários por alternativa' },
              { id: 'flashcards', label: `Flashcards (${flashcardsRelacionados.length})` },
            ].map(tab => (
              <button key={tab.id} onClick={() => setActiveTab(tab.id)} style={{
                padding: '10px 14px', fontSize: 13, fontWeight: 600,
                color: activeTab === tab.id ? C.accent : C.textMuted,
                borderBottom: `2px solid ${activeTab === tab.id ? C.accent : 'transparent'}`,
                whiteSpace: 'nowrap'
              }}>{tab.label}</button>
            ))}
          </div>

          <Card C={C} style={{ marginBottom: 16 }}>
            {activeTab === 'detalhado' && (
              <div>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12, flexWrap: 'wrap', gap: 8 }}>
                  <h4 style={{ margin: 0, fontSize: 15, color: C.text, fontWeight: 600 }}>Análise aprofundada</h4>
                  <div style={{ display: 'flex', gap: 6 }}>
                    <Button C={C} variant="ghost" size="sm" icon={I.Sparkles}
                      onClick={() => alert('IA: para gerar comentários automaticamente é necessário conectar à API. Hospede o site para ativar este recurso.')}>
                      Gerar com IA
                    </Button>
                    <Button C={C} variant="secondary" size="sm" icon={I.Edit}
                      onClick={() => setEditandoComentario(!editandoComentario)}>
                      {editandoComentario ? 'Cancelar' : 'Editar'}
                    </Button>
                  </div>
                </div>
                {editandoComentario ? (
                  <>
                    <textarea value={comentarioEdit} onChange={e => setComentarioEdit(e.target.value)}
                      style={{ width: '100%', minHeight: 180, padding: 12, borderRadius: 8,
                        border: `1px solid ${C.border}`, background: C.bg, color: C.text,
                        fontSize: 14, lineHeight: 1.6, resize: 'vertical' }} />
                    <div style={{ marginTop: 10, display: 'flex', gap: 8 }}>
                      <Button C={C} size="sm" icon={I.Save} onClick={() => {
                        onUpdate({ ...questao, comentarioDetalhado: comentarioEdit });
                        setEditandoComentario(false);
                      }}>Salvar</Button>
                    </div>
                  </>
                ) : (
                  <div style={{ fontSize: 14, lineHeight: 1.7, color: C.text }}>
                    {questao.comentarioDetalhado || <span style={{ color: C.textSoft }}>Nenhum comentário detalhado. Clique em Editar para adicionar.</span>}
                  </div>
                )}
              </div>
            )}

            {activeTab === 'dica' && (
              <div>
                <h4 style={{ margin: '0 0 12px', fontSize: 15, color: C.text, fontWeight: 600 }}>Dica de prova</h4>
                <div style={{
                  padding: 16, borderRadius: 10, background: C.bg,
                  border: `1px solid ${C.borderSoft}`, fontSize: 14,
                  lineHeight: 1.7, color: C.text
                }}>
                  {questao.dicaProva || <span style={{ color: C.textSoft }}>Nenhuma dica de prova cadastrada. Clique em “Editar questão” para adicionar.</span>}
                </div>
              </div>
            )}

            {activeTab === 'alternativas' && (
              <div>
                <h4 style={{ margin: '0 0 12px', fontSize: 15, color: C.text, fontWeight: 600 }}>Comentários por alternativa</h4>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                  {(questao.alternativas || []).filter(a => (a.texto || '').trim()).map(alt => (
                    <div key={alt.letra} style={{ padding: 12, borderRadius: 8, background: C.bg, border: `1px solid ${C.borderSoft}` }}>
                      <div style={{ display: 'flex', gap: 8, alignItems: 'center', marginBottom: 6 }}>
                        <Badge C={C} color={alt.letra === questao.gabarito ? 'accent' : 'soft'}>{alt.letra}</Badge>
                        <span style={{ fontSize: 13, color: C.text, fontWeight: 600 }}>
                          {alt.letra === questao.gabarito ? 'Gabarito' : 'Distrator'}
                        </span>
                      </div>
                      <div style={{ fontSize: 13, color: C.textMuted, lineHeight: 1.5, marginBottom: 6 }}>{alt.texto}</div>
                      <div style={{ fontSize: 13.5, color: C.text, lineHeight: 1.6 }}>
                        {alt.comentario || <span style={{ color: C.textSoft }}>Sem comentário cadastrado para esta alternativa.</span>}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {activeTab === 'checklist' && (
              <div>
                <h4 style={{ margin: '0 0 6px', fontSize: 15, color: C.text, fontWeight: 600 }}>Pontos essenciais</h4>
                <p style={{ fontSize: 12, color: C.textMuted, margin: '0 0 18px' }}>
                  Para cada ponto: você sabia, estava na incerteza, foi desatenção ou não sabia.
                </p>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
                  {(questao.checklist || []).map((item, i) => (
                    <div key={i}>
                      <div style={{ fontSize: 14, color: C.text, lineHeight: 1.5, marginBottom: 8 }}>{item}</div>
                      <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                        {[
                          { v: 'sim', label: 'Sim', cor: C.success },
                          { v: 'incerteza', label: 'Incerteza', cor: C.warn },
                          { v: 'desatencao', label: 'Desatenção', cor: '#7c6f9a' },
                          { v: 'nao', label: 'Não', cor: C.error },
                        ].map(opt => {
                          const sel = questao.checklistRespostas?.[i] === opt.v;
                          return (
                            <button key={opt.v} onClick={() => setChecklist(i, opt.v)} style={{
                              padding: '5px 12px', borderRadius: 6, fontSize: 12.5, fontWeight: 600,
                              background: sel ? opt.cor : 'transparent',
                              color: sel ? '#fff' : opt.cor,

            {activeTab === 'flashcards' && (
              <div>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 14, flexWrap: 'wrap', gap: 8 }}>

                    Flashcards desta questão
                  </h4>

                  </Button>

                      style={{ width: '100%', padding: 10, borderRadius: 6, minHeight: 90,
                        border: `1px solid ${C.border}`, background: C.card, color: C.text, fontSize: 14, resize: 'vertical' }} />

                      <Button C={C} size="sm" onClick={criarFlashcard}>Criar</Button>

                {flashcardsRelacionados.length === 0 && !criandoFlashcard ? (

}

// ============= CRIAR QUESTÃO =============
function CriarQuestao({ C, instituicoes, setInstituicoes, onSave, onCancel, questaoInicial = null, modoEdicao = false }) {
  const criarEstadoInicial = () => {
    const base = questaoInicial ? { ...questaoInicial } : {
      numero: '', instituicao: instituicoes[0], ano: new Date().getFullYear(),
      tema: 'cardio', subtema: '', enunciado: '', gabarito: 'A',
      alternativas: [], comentarioBreve: '', comentarioDetalhado: '', dicaProva: '',
      checklist: ['', '', '', ''], tags: [], dificuldade: 'media', fonte: ''
    };
    const alternativasBase = ['A','B','C','D','E'].map(letra => {
      const existente = (base.alternativas || []).find(a => a.letra === letra);
      return existente || { letra, texto: '', comentario: '' };
    });
    const checklistBase = [...(base.checklist || []), '', '', '', ''].slice(0, 4);
    return { ...base, alternativas: alternativasBase, checklist: checklistBase };
  };
  const [q, setQ] = useState(criarEstadoInicial);
  const [novaInst, setNovaInst] = useState('');
  const [novoTemaNome, setNovoTemaNome] = useState('');
  const [novoAnoValor, setNovoAnoValor] = useState('');

  const salvar = () => {
    const alternativasValidas = q.alternativas.filter(a => a.texto.trim());
    const gabaritoTemTexto = alternativasValidas.some(a => a.letra === q.gabarito);
    if (!q.enunciado.trim() || alternativasValidas.length < 2 || !gabaritoTemTexto) {
      alert('Preencha o enunciado, pelo menos duas alternativas e marque como gabarito uma alternativa preenchida.');
      return;
    }
    const dadosSalvos = {
      ...q,
      id: modoEdicao ? q.id : 'q-' + Date.now(),
      alternativas: alternativasValidas,
      checklist: q.checklist.filter(c => c.trim()),
    };
    onSave(modoEdicao ? dadosSalvos : {
      ...dadosSalvos,
      resposta: null, acertou: null, checklistRespostas: {},
      revisarDepois: false, favorita: false, dataResposta: null
    });
  };

  const setAlt = (i, campo, valor) => {
    const novo = [...q.alternativas]; novo[i] = { ...novo[i], [campo]: valor }; setQ({...q, alternativas: novo});
  };

  const addInst = () => {
    if (novaInst.trim()) {
      setInstituicoes([...instituicoes, novaInst.trim()]);
      setQ({...q, instituicao: novaInst.trim()});
      setNovaInst('');
    }
  };
  const addTema = () => {
    if (novoTemaNome.trim()) salvarEspecialidadeGlobal(novoTemaNome.trim());
  };
  const addAno = () => {
    if (novoAnoValor) salvarAnoGlobal(novoAnoValor);
  };

  return (
    <div className="lumen-fade-in">
      <Button C={C} variant="ghost" size="sm" icon={I.ArrowL} onClick={onCancel} style={{ marginBottom: 16 }}>
        Voltar
      </Button>
      <h2 className="lumen-serif" style={{ fontSize: 26, margin: '0 0 20px', color: C.text }}>
        {modoEdicao ? 'Editar questão' : 'Cadastrar nova questão'}
      </h2>

      <Card C={C} style={{ marginBottom: 16 }}>
        <h3 style={{ margin: '0 0 14px', fontSize: 15, color: C.text }}>Identificação</h3>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(140px, 1fr))', gap: 12 }}>
          <FormInput C={C} label="Número" value={q.numero} onChange={v => setQ({...q, numero: v})} />
          <div>
            <FormLabel C={C}>Instituição</FormLabel>
            <select value={q.instituicao} onChange={e => setQ({...q, instituicao: e.target.value})} style={inputStyle(C)}>
              {instituicoes.map(i => <option key={i}>{i}</option>)}
            </select>
            <div style={{ display: 'flex', gap: 6, marginTop: 6 }}>
              <input value={novaInst} onChange={e => setNovaInst(e.target.value)} placeholder="Nova..."
                style={{ ...inputStyle(C), padding: '6px 10px', fontSize: 12 }} />
              <button onClick={addInst} style={{ padding: '6px 10px', borderRadius: 6,
                background: C.accent, color: '#fff', fontSize: 12, fontWeight: 600 }}>+</button>
            </div>
          </div>
          <div>
            <FormLabel C={C}>Ano</FormLabel>
            <select value={q.ano} onChange={e => setQ({...q, ano: parseInt(e.target.value)})} style={inputStyle(C)}>
              {ANOS_QUESTOES.map(a => <option key={a} value={a}>{a}</option>)}
            </select>
            <div style={{ display: 'flex', gap: 6, marginTop: 6 }}>
              <input value={novoAnoValor} onChange={e => setNovoAnoValor(e.target.value)} placeholder="Novo ano" type="number" style={{ ...inputStyle(C), padding: '6px 10px', fontSize: 12 }} />
              <button onClick={addAno} style={{ padding: '6px 10px', borderRadius: 6, background: C.accent, color: '#fff', fontSize: 12, fontWeight: 600 }}>+</button>
            </div>
          </div>
          <div>
            <FormLabel C={C}>Especialidade/Tema</FormLabel>
            <select value={q.tema} onChange={e => setQ({...q, tema: e.target.value})} style={inputStyle(C)}>
              {ESPECIALIDADES.map(t => <option key={t.id} value={t.id}>{t.nome}</option>)}
            </select>
            <div style={{ display: 'flex', gap: 6, marginTop: 6 }}>
              <input value={novoTemaNome} onChange={e => setNovoTemaNome(e.target.value)} placeholder="Novo tema" style={{ ...inputStyle(C), padding: '6px 10px', fontSize: 12 }} />
              <button onClick={addTema} style={{ padding: '6px 10px', borderRadius: 6, background: C.accent, color: '#fff', fontSize: 12, fontWeight: 600 }}>+</button>
            </div>
          </div>
          <FormInput C={C} label="Subtema" value={q.subtema} onChange={v => setQ({...q, subtema: v})} />
          <div>
            <FormLabel C={C}>Dificuldade</FormLabel>
            <select value={q.dificuldade} onChange={e => setQ({...q, dificuldade: e.target.value})} style={inputStyle(C)}>
              <option value="facil">Fácil</option><option value="media">Média</option><option value="dificil">Difícil</option>
            </select>
          </div>
        </div>
      </Card>

      <Card C={C} style={{ marginBottom: 16 }}>
        <h3 style={{ margin: '0 0 14px', fontSize: 15, color: C.text }}>Enunciado e alternativas A–E</h3>
        <FormLabel C={C}>Enunciado</FormLabel>
        <textarea value={q.enunciado} onChange={e => setQ({...q, enunciado: e.target.value})}
          style={{ ...inputStyle(C), minHeight: 140, fontFamily: 'Fraunces, serif', fontSize: 14, lineHeight: 1.65 }} />

        <div style={{ marginTop: 14, display: 'flex', flexDirection: 'column', gap: 12 }}>
          {q.alternativas.map((alt, i) => (
            <div key={alt.letra} style={{ display: 'grid', gridTemplateColumns: '36px minmax(0, 1fr)', gap: 8, alignItems: 'start' }}>
              <button onClick={() => setQ({...q, gabarito: alt.letra})} style={{
                width: 36, height: 36, borderRadius: 6, flexShrink: 0,
                background: q.gabarito === alt.letra ? C.success : C.borderSoft,
                color: q.gabarito === alt.letra ? '#fff' : C.text,
                fontWeight: 700, fontSize: 14
              }}>{alt.letra}</button>
              <div>
                <textarea value={alt.texto} onChange={e => setAlt(i, 'texto', e.target.value)}
                  placeholder={`Alternativa ${alt.letra} — deixe em branco se a prova tiver apenas A-D`}
                  style={{ ...inputStyle(C), minHeight: 38, padding: '9px 12px', fontSize: 13.5 }} />
                <textarea value={alt.comentario || ''} onChange={e => setAlt(i, 'comentario', e.target.value)}
                  placeholder={`Comentário da alternativa ${alt.letra} — por que está correta/incorreta`}
                  style={{ ...inputStyle(C), minHeight: 54, marginTop: 6, padding: '8px 12px', fontSize: 12.5 }} />
              </div>
            </div>
          ))}
        </div>
        <p style={{ fontSize: 12, color: C.textSoft, margin: '10px 0 0' }}>
          Clique na letra para marcar como gabarito. Selecionado: <strong style={{ color: C.success }}>{q.gabarito}</strong>
        </p>
      </Card>

      <Card C={C} style={{ marginBottom: 16 }}>
        <h3 style={{ margin: '0 0 14px', fontSize: 15, color: C.text }}>Comentários gerais</h3>
        <FormLabel C={C}>Comentário breve após confirmar resposta</FormLabel>
        <textarea value={q.comentarioBreve} onChange={e => setQ({...q, comentarioBreve: e.target.value})}
          style={{ ...inputStyle(C), minHeight: 70 }} />
        <FormLabel C={C} style={{ marginTop: 12 }}>Comentário detalhado</FormLabel>
        <textarea value={q.comentarioDetalhado} onChange={e => setQ({...q, comentarioDetalhado: e.target.value})}
          style={{ ...inputStyle(C), minHeight: 120 }} />
        <FormLabel C={C} style={{ marginTop: 12 }}>Dica de prova</FormLabel>
        <textarea value={q.dicaProva || ''} onChange={e => setQ({...q, dicaProva: e.target.value})}
          placeholder="Macete, pegadinha ou ponto que costuma cair na prova"
          style={{ ...inputStyle(C), minHeight: 70 }} />
        <FormLabel C={C} style={{ marginTop: 12 }}>Checklist (3-4 pontos essenciais)</FormLabel>
        {q.checklist.map((c, i) => (
          <input key={i} value={c} onChange={e => {
            const novo = [...q.checklist]; novo[i] = e.target.value; setQ({...q, checklist: novo});
          }} placeholder={`Ponto ${i + 1}...`} style={{ ...inputStyle(C), marginBottom: 6 }} />
        ))}
      </Card>

      <div style={{ display: 'flex', gap: 10 }}>
        <Button C={C} size="lg" icon={I.Save} onClick={salvar}>{modoEdicao ? 'Salvar alterações' : 'Salvar questão'}</Button>
        <Button C={C} variant="secondary" size="lg" onClick={onCancel}>Cancelar</Button>
      </div>
    </div>
  );
}

const FormLabel = ({ C, children, style = {} }) => (
  <div style={{ fontSize: 11, fontWeight: 700, color: C.textSoft, marginBottom: 5,
    letterSpacing: '0.06em', textTransform: 'uppercase', ...style }}>{children}</div>
);
const FormInput = ({ C, label, value, onChange, type = 'text' }) => (
  <div>
    <FormLabel C={C}>{label}</FormLabel>
    <input type={type} value={value} onChange={e => onChange(e.target.value)} style={inputStyle(C)} />
  </div>
);
const inputStyle = (C) => ({
  width: '100%', padding: '9px 12px', borderRadius: 6,
  border: `1px solid ${C.border}`, background: C.bg, color: C.text,
  fontSize: 14, resize: 'vertical', fontFamily: 'inherit'
});

// ============= SIMULADO =============
function Simulado({ questoes, setQuestoes, instituicoes, C, isDark }) {
  const [config, setConfig] = useState({ qtd: 10, temas: [], instituicoes: [], anos: [], minutos: 30 });
  const [emAndamento, setEmAndamento] = useState(false);
  const [questoesSimulado, setQuestoesSimulado] = useState([]);
  const [respostas, setRespostas] = useState({});
  const [tempo, setTempo] = useState(0);
  const [finalizado, setFinalizado] = useState(false);
  const [idx, setIdx] = useState(0);
  const instituicoesDisp = [...new Set([...(instituicoes || []), ...questoes.map(q => q.instituicao).filter(Boolean)])].sort();

  useEffect(() => {
    if (!emAndamento || finalizado) return;
    const t = setInterval(() => setTempo(s => s + 1), 1000);
    return () => clearInterval(t);
  }, [emAndamento, finalizado]);

  const toggle = (campo, valor) => {
    const arr = config[campo] || [];
    setConfig({...config, [campo]: arr.includes(valor) ? arr.filter(x => x !== valor) : [...arr, valor]});
  };

  const iniciar = () => {
    const pool = questoes.filter(q => {
      if (config.temas.length && !config.temas.includes(q.tema)) return false;
      if (config.instituicoes.length && !config.instituicoes.includes(q.instituicao)) return false;
      if (config.anos.length && !config.anos.includes(Number(q.ano))) return false;
      return true;
    });
    if (pool.length === 0) { alert('Nenhuma questão disponível com esses filtros.'); return; }
    const sel = [...pool].sort(() => Math.random() - 0.5).slice(0, config.qtd);
    setQuestoesSimulado(sel); setEmAndamento(true); setTempo(0); setIdx(0); setFinalizado(false); setRespostas({});
  };

  const finalizar = () => {
    setFinalizado(true);
    const novas = [...questoes];
    questoesSimulado.forEach(q => {
      if (respostas[q.id]) {
        const i = novas.findIndex(x => x.id === q.id);
        if (i >= 0) novas[i] = { ...novas[i], resposta: respostas[q.id], acertou: respostas[q.id] === q.gabarito, dataResposta: new Date().toISOString() };
      }
    });
    setQuestoes(novas);
  };

  const fmt = (s) => `${String(Math.floor(s / 60)).padStart(2, '0')}:${String(s % 60).padStart(2, '0')}`;

  if (finalizado) {
    const acertos = questoesSimulado.filter(q => respostas[q.id] === q.gabarito).length;
    return <div className="lumen-fade-in"><Card C={C} style={{ textAlign: 'center', padding: 40 }}>
      <span style={{ color: C.accent }}><I.Award size={40} /></span>
      <h2 className="lumen-serif" style={{ fontSize: 30, margin: '14px 0 8px', color: C.text }}>Simulado finalizado</h2>
      <p style={{ fontSize: 14, color: C.textMuted, margin: '0 0 24px' }}>Tempo: {fmt(tempo)}</p>
      <div style={{ fontSize: 60, fontFamily: 'Fraunces, serif', fontWeight: 600, color: C.accent, lineHeight: 1 }}>{Math.round((acertos / questoesSimulado.length) * 100)}%</div>
      <div style={{ fontSize: 15, color: C.textMuted, marginTop: 8, marginBottom: 24 }}>{acertos} de {questoesSimulado.length} questões corretas</div>
      <Button C={C} onClick={() => { setEmAndamento(false); setFinalizado(false); setQuestoesSimulado([]); }}>Novo simulado</Button>
    </Card></div>;
  }

  if (emAndamento) {
    const q = questoesSimulado[idx];
    return <div className="lumen-fade-in">
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 18, padding: '14px 18px', background: C.card, borderRadius: 10, border: `1px solid ${C.borderSoft}`, gap: 12, flexWrap: 'wrap' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}><span style={{ color: C.accent }}><I.Clock size={18} /></span><span className="lumen-serif" style={{ fontSize: 22, fontWeight: 600, color: C.text }}>{fmt(tempo)}</span></div>
        <span style={{ fontSize: 14, color: C.textMuted, fontWeight: 600 }}>{idx + 1} / {questoesSimulado.length}</span>
        <Button C={C} variant="danger" size="sm" onClick={finalizar}>Finalizar</Button>
      </div>
      <Card C={C} style={{ marginBottom: 16 }}>
        <Badge C={C} color="soft">{q.instituicao} · {q.ano}</Badge>
        <div className="lumen-serif" style={{ fontSize: 15, lineHeight: 1.7, color: C.text, marginTop: 10 }}>{q.enunciado}</div>
      </Card>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 8, marginBottom: 16 }}>
        {(q.alternativas || []).filter(a => (a.texto || '').trim()).map(alt => {
          const sel = respostas[q.id] === alt.letra;
          return <button key={alt.letra} onClick={() => setRespostas({...respostas, [q.id]: alt.letra})} style={{ padding: '12px 14px', borderRadius: 8, textAlign: 'left', background: sel ? C.accentSoft : C.card, border: `1.5px solid ${sel ? C.accent : C.borderSoft}`, display: 'flex', gap: 12, alignItems: 'center', color: C.text, fontSize: 14 }}>
            <div style={{ width: 28, height: 28, borderRadius: '50%', background: sel ? C.accent : C.borderSoft, color: sel ? '#fff' : C.text, display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 700, fontSize: 13, flexShrink: 0 }}>{alt.letra}</div>{alt.texto}
          </button>;
        })}
      </div>
      <div style={{ display: 'flex', gap: 10 }}><Button C={C} variant="secondary" disabled={idx === 0} onClick={() => setIdx(idx - 1)} icon={I.ChevL}>Anterior</Button><Button C={C} disabled={idx === questoesSimulado.length - 1} onClick={() => setIdx(idx + 1)}>Próxima <I.ChevR size={15} /></Button></div>
    </div>;
  }

  return <div className="lumen-fade-in"><Card C={C}>
    <h2 className="lumen-serif" style={{ fontSize: 22, margin: '0 0 6px', color: C.text }}>Configurar simulado</h2>
    <p style={{ color: C.textMuted, fontSize: 14, margin: '0 0 24px' }}>Selecione quantidade, tempo, especialidades, instituições e anos preferidos.</p>
    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(180px, 1fr))', gap: 16, marginBottom: 20 }}>
      <FormInput C={C} label="Quantidade de questões" type="number" value={config.qtd} onChange={v => setConfig({...config, qtd: parseInt(v) || 1})} />
      <FormInput C={C} label="Tempo (minutos)" type="number" value={config.minutos} onChange={v => setConfig({...config, minutos: parseInt(v) || 1})} />
    </div>
    <FormLabel C={C}>Especialidades</FormLabel><ChipGroup C={C} items={ESPECIALIDADES.map(t => [t.id, t.nome])} selected={config.temas} onToggle={v => toggle('temas', v)} />
    <FormLabel C={C} style={{ marginTop: 14 }}>Instituições preferidas</FormLabel><ChipGroup C={C} items={instituicoesDisp.map(i => [i, i])} selected={config.instituicoes} onToggle={v => toggle('instituicoes', v)} emptyLabel="Nenhuma instituição cadastrada" />
    <FormLabel C={C} style={{ marginTop: 14 }}>Anos preferidos</FormLabel><ChipGroup C={C} items={ANOS_QUESTOES.map(a => [a, String(a)])} selected={config.anos} onToggle={v => toggle('anos', v)} />
    <Button C={C} size="lg" icon={I.Play} onClick={iniciar} style={{ marginTop: 20 }}>Iniciar simulado</Button>
  </Card></div>;
}

const ChipGroup = ({ C, items, selected, onToggle, emptyLabel }) => (
  <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, marginBottom: 8 }}>
    {items.length === 0 && <span style={{ fontSize: 12, color: C.textSoft }}>{emptyLabel || 'Nenhum item disponível'}</span>}
    {items.map(([v, l]) => {
      const sel = selected.includes(v);
      return <button key={v} onClick={() => onToggle(v)} style={pillStyle(C, sel)}>{l}</button>;
    })}
  </div>
);

// ============= FLASHCARDS =============
function Flashcards({ flashcards, setFlashcards, questoes, setPage, C }) {
  const [view, setView] = useState('lista');
  const [filtroTema, setFiltroTema] = useState('todos');
  const [filtroSubtema, setFiltroSubtema] = useState('todos');
  const [filtroRevisao, setFiltroRevisao] = useState('todos');
  const [revisIdx, setRevisIdx] = useState(0);
  const [mostrar, setMostrar] = useState(false);
  const [novoSubtema, setNovoSubtema] = useState('');
  const [novo, setNovo] = useState({ frente: '', verso: '', tema: 'cardio', subtema: '', tags: [], dificuldade: 'media' });

  const hoje = new Date();
  const normalizarData = (d) => d ? new Date(d) : null;
  const estaVencido = (f) => !f.proximaRevisao || normalizarData(f.proximaRevisao) <= hoje || f.revisarHoje;
  const subtemas = [...new Set(flashcards.filter(f => filtroTema === 'todos' || f.tema === filtroTema).map(f => f.subtema).filter(Boolean))].sort();

  const filtrados = flashcards.filter(f => {
    if (filtroTema !== 'todos' && f.tema !== filtroTema) return false;
    if (filtroSubtema !== 'todos' && (f.subtema || '') !== filtroSubtema) return false;
    if (filtroRevisao === 'vencidos' && !estaVencido(f)) return false;
    if (filtroRevisao === 'futuros' && estaVencido(f)) return false;
    return true;
  });
  const paraRevisar = filtrados.filter(estaVencido);
  const filaRevisao = paraRevisar.length ? paraRevisar : filtrados;

  const salvar = () => {
    if (!novo.frente.trim() || !novo.verso.trim()) return;
    setFlashcards([{
      ...novo,
      id: 'f-' + Date.now(),
      dataCriacao: new Date().toISOString(),
      proximaRevisao: new Date().toISOString(),
      intervaloDias: 0,
      revisarHoje: true,
      historico: [],
      questaoId: null
    }, ...flashcards]);
    setNovo({ frente: '', verso: '', tema: novo.tema, subtema: novo.subtema, tags: [], dificuldade: 'media' });
    setView('lista');
  };

  const revisar = (f, nivel) => {
    const mapa = {
      dificil: { dias: 1, label: 'Difícil' },
      medio: { dias: Math.max(3, (f.intervaloDias || 1) * 2), label: 'Médio' },
      facil: { dias: Math.max(7, (f.intervaloDias || 1) * 3), label: 'Fácil' },
    };
    const regra = mapa[nivel];
    const prox = new Date();
    prox.setDate(prox.getDate() + regra.dias);
    setFlashcards(flashcards.map(x => x.id === f.id ? {
      ...x,
      dificuldade: nivel,
      intervaloDias: regra.dias,
      proximaRevisao: prox.toISOString(),
      revisarHoje: false,
      historico: [...(x.historico || []), { data: new Date().toISOString(), nivel, intervaloDias: regra.dias }]
    } : x));
    setMostrar(false);
    setRevisIdx(revisIdx + 1);
  };

  const irParaQuestao = (questaoId) => {
    if (!questaoId) return;
    storage.set('lumen_open_question', questaoId);
    setPage('questoes');
  };

  if (view === 'revisar' && filaRevisao.length > 0) {
    const f = filaRevisao[revisIdx % filaRevisao.length];
    const tema = ESPECIALIDADES.find(t => t.id === f.tema);
    return <div className="lumen-fade-in" style={{ maxWidth: 760, margin: '0 auto' }}>
      <Button C={C} variant="ghost" icon={I.ArrowL} onClick={() => setView('lista')} style={{ marginBottom: 16 }}>Voltar</Button>
      <div style={{ textAlign: 'center', marginBottom: 16, fontSize: 13, color: C.textMuted }}>
        {revisIdx + 1} de {filaRevisao.length} · {tema?.nome || 'Especialidade'} {f.subtema ? `• ${f.subtema}` : ''}
      </div>
      <Card C={C} onClick={() => setMostrar(!mostrar)} style={{ minHeight: 320, padding: 40, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', textAlign: 'center' }}>
        <div>
          <div style={{ fontSize: 11, color: C.textSoft, letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 16 }}>{mostrar ? 'Verso' : 'Frente'}</div>
          <div className="lumen-serif" style={{ fontSize: 'clamp(18px, 3vw, 26px)', lineHeight: 1.4, color: C.text, fontWeight: 500 }}>{mostrar ? f.verso : f.frente}</div>
          {!mostrar && <div style={{ marginTop: 24, fontSize: 12, color: C.textSoft }}>Clique para virar</div>}
        </div>
      </Card>
      {f.questaoId && <div style={{ textAlign: 'center', marginTop: 12 }}><Button C={C} variant="secondary" size="sm" icon={I.Book} onClick={() => irParaQuestao(f.questaoId)}>Ir diretamente para a questão</Button></div>}
      {mostrar && <div style={{ display: 'flex', gap: 8, marginTop: 16, justifyContent: 'center', flexWrap: 'wrap' }}>
        <Button C={C} variant="danger" onClick={() => revisar(f, 'dificil')}>Difícil · revisar em 1 dia</Button>
        <Button C={C} variant="secondary" onClick={() => revisar(f, 'medio')}>Médio · revisar em poucos dias</Button>
        <Button C={C} variant="success" onClick={() => revisar(f, 'facil')}>Fácil · revisar em 1 semana+</Button>
      </div>}
    </div>;
  }

  if (view === 'criar') {
    const subtemasDaEspecialidade = [...new Set(flashcards.filter(f => f.tema === novo.tema).map(f => f.subtema).filter(Boolean))].sort();
    return <div className="lumen-fade-in"><Button C={C} variant="ghost" icon={I.ArrowL} onClick={() => setView('lista')} style={{ marginBottom: 16 }}>Voltar</Button><Card C={C}>
      <h3 className="lumen-serif" style={{ fontSize: 22, margin: '0 0 16px' }}>Novo flashcard</h3>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(180px, 1fr))', gap: 12, marginBottom: 16 }}>
        <div><FormLabel C={C}>Especialidade</FormLabel><select value={novo.tema} onChange={e => setNovo({...novo, tema: e.target.value, subtema: ''})} style={inputStyle(C)}>{ESPECIALIDADES.map(t => <option key={t.id} value={t.id}>{t.nome}</option>)}</select></div>
        <div><FormLabel C={C}>Subtema</FormLabel><select value={novo.subtema} onChange={e => setNovo({...novo, subtema: e.target.value})} style={inputStyle(C)}><option value="">Sem subtema</option>{subtemasDaEspecialidade.map(s => <option key={s}>{s}</option>)}</select></div>
      </div>
      <div style={{ display: 'flex', gap: 8, marginBottom: 16 }}>
        <input value={novoSubtema} onChange={e => setNovoSubtema(e.target.value)} placeholder="Adicionar novo subtema nesta especialidade" style={{ ...inputStyle(C), padding: '8px 10px' }} />
        <Button C={C} variant="secondary" onClick={() => { if (novoSubtema.trim()) { setNovo({...novo, subtema: novoSubtema.trim()}); setNovoSubtema(''); } }}>Usar subtema</Button>
      </div>
      <FormLabel C={C}>Frente</FormLabel><textarea value={novo.frente} onChange={e => setNovo({...novo, frente: e.target.value})} style={{ ...inputStyle(C), minHeight: 80, marginBottom: 12 }} />
      <FormLabel C={C}>Verso</FormLabel><textarea value={novo.verso} onChange={e => setNovo({...novo, verso: e.target.value})} style={{ ...inputStyle(C), minHeight: 100, marginBottom: 12 }} />
      <div style={{ maxWidth: 220, marginBottom: 16 }}><FormLabel C={C}>Dificuldade inicial</FormLabel><select value={novo.dificuldade} onChange={e => setNovo({...novo, dificuldade: e.target.value})} style={inputStyle(C)}><option value="facil">Fácil</option><option value="media">Média</option><option value="dificil">Difícil</option></select></div>
      <Button C={C} icon={I.Save} onClick={salvar}>Salvar flashcard</Button>
    </Card></div>;
  }

  return <div className="lumen-fade-in">
    <Card C={C} style={{ marginBottom: 16 }}>
      <h3 className="lumen-serif" style={{ fontSize: 18, margin: '0 0 8px' }}>Organização dos flashcards</h3>
      <p style={{ margin: 0, color: C.textMuted, fontSize: 13 }}>Agora os flashcards ficam por especialidade e subtema. A revisão espaçada é calculada conforme a dificuldade escolhida ao responder.</p>
    </Card>
    <div style={{ display: 'flex', gap: 10, marginBottom: 18, flexWrap: 'wrap' }}>
      <Button C={C} icon={I.Plus} onClick={() => setView('criar')}>Novo flashcard</Button>
      <Button C={C} variant="secondary" icon={I.Play} onClick={() => { setRevisIdx(0); setMostrar(false); setView('revisar'); }} disabled={filaRevisao.length === 0}>Revisar ({filaRevisao.length})</Button>
      <select value={filtroTema} onChange={e => { setFiltroTema(e.target.value); setFiltroSubtema('todos'); }} style={{ padding: '8px 12px', borderRadius: 8, border: `1px solid ${C.border}`, background: C.card, color: C.text, fontSize: 13 }}><option value="todos">Todas as especialidades</option>{ESPECIALIDADES.map(t => <option key={t.id} value={t.id}>{t.nome}</option>)}</select>
      <select value={filtroSubtema} onChange={e => setFiltroSubtema(e.target.value)} style={{ padding: '8px 12px', borderRadius: 8, border: `1px solid ${C.border}`, background: C.card, color: C.text, fontSize: 13 }}><option value="todos">Todos os subtemas</option>{subtemas.map(s => <option key={s}>{s}</option>)}</select>
      <select value={filtroRevisao} onChange={e => setFiltroRevisao(e.target.value)} style={{ padding: '8px 12px', borderRadius: 8, border: `1px solid ${C.border}`, background: C.card, color: C.text, fontSize: 13 }}><option value="todos">Todos</option><option value="vencidos">Para revisar hoje</option><option value="futuros">Agendados para depois</option></select>
    </div>
    {filtrados.length === 0 ? <Card C={C} style={{ textAlign: 'center', padding: 60 }}><I.Layers size={32} /><div style={{ fontSize: 15, color: C.textMuted, marginTop: 12, marginBottom: 4 }}>Nenhum flashcard ainda.</div><div style={{ fontSize: 13, color: C.textSoft }}>Crie flashcards por especialidade e subtema.</div></Card> :
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))', gap: 12 }}>{filtrados.map(f => { const tema = ESPECIALIDADES.find(t => t.id === f.tema); const prox = f.proximaRevisao ? new Date(f.proximaRevisao).toLocaleDateString('pt-BR') : 'hoje'; return <Card key={f.id} C={C} hover style={{ padding: 16 }}><div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 10, gap: 6, flexWrap: 'wrap' }}>{tema && <Badge C={C}>{tema.nome}</Badge>}<Badge C={C} color="soft">{f.subtema || 'Sem subtema'}</Badge>{f.questaoId && <Badge C={C} color="soft">Q vinculada</Badge>}</div><div className="lumen-serif" style={{ fontSize: 15, fontWeight: 500, color: C.text, marginBottom: 8, display: '-webkit-box', WebkitLineClamp: 3, WebkitBoxOrient: 'vertical', overflow: 'hidden' }}>{f.frente}</div><div style={{ fontSize: 13, color: C.textMuted, lineHeight: 1.5, display: '-webkit-box', WebkitLineClamp: 2, WebkitBoxOrient: 'vertical', overflow: 'hidden' }}>{f.verso}</div><div style={{ marginTop: 10, fontSize: 12, color: estaVencido(f) ? C.error : C.textSoft }}>Próxima revisão: {prox}</div><div style={{ display: 'flex', gap: 6, marginTop: 12, justifyContent: 'flex-end', flexWrap: 'wrap' }}>{f.questaoId && <Button C={C} variant="secondary" size="sm" icon={I.Book} onClick={() => irParaQuestao(f.questaoId)}>Ir para questão</Button>}<button onClick={() => { if (confirm('Deletar este flashcard?')) setFlashcards(flashcards.filter(x => x.id !== f.id)); }} style={{ padding: 6, color: C.textSoft, display: 'flex' }}><I.Trash size={13} /></button></div></Card>; })}</div>}
  </div>;
}
